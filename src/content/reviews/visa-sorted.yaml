name: Visa sorted in days
service: visa
rating: 5
en:
  before: Lost in a pile of visa documents, scared of making a costly mistake.
  after: Got a clear checklist for my exact situation and applied with confidence.
  quote: >-
    They told me exactly what I needed — and what I didn't. I did the
    application myself, but I never felt alone.
ko:
  before: 비자 서류 더미 속에서 길을 잃고, 실수할까 봐 무서웠어요.
  after: 제 상황에 딱 맞는 체크리스트를 받고 자신 있게 신청했어요.
  quote: 무엇이 필요한지, 무엇은 필요 없는지 정확히 알려줬어요. 신청은 직접 했지만 혼자라는 느낌은 없었어요.
my:
  before: ဗီဇာစာရွက်တွေကြားမှာ လမ်းပျောက်နေပြီး မှားမှာ ကြောက်နေခဲ့တယ်။
  after: >-
    ကိုယ့်အခြေအနေအတွက် ရှင်းလင်းတဲ့ checklist ရပြီး ယုံကြည်စွာ
    လျှောက်နိုင်ခဲ့ပါတယ်။
  quote: >-
    ဘယ်ဟာက လိုအပ်တယ် မလိုအပ်လဲဆိုတာ တိတိကျကျ ပြောပြတယ်။ ကိုယ်တိုင်လျှောက်ပေမယ့်
    တစ်ယောက်တည်း မဟုတ်သလို ခံစားရတယ်။
