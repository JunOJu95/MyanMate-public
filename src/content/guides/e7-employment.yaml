title: E-7 Employment Visa
category: visa
order: 5
lastReviewed: 2026-07-19
en:
  title: E-7 Employment Visa — E-7-1 professionals and E-7-4 skilled workers
  summary: |-
    E-7 is for work in fields designated by the Ministry of Justice. This guide separates the two routes most relevant to MyanMate readers: E-7-1 for professional roles, often after D-10, and E-7-4 for experienced workers changing from E-9, E-10, or H-2. The occupation, employment terms, and evidence are reviewed together.
  eligibility: |-
    Start by identifying the exact route. E-7-1 and E-7-4 have different occupations, qualifications, and review standards.
    E-7-1: You have an employment contract for a designated professional occupation. The general qualification route is a related master's degree, a related bachelor's degree plus at least 1 year of related experience, or at least 5 years of related experience. Occupation-specific rules and exceptions may apply.
    E-7-4: You are currently staying and working legally on E-9, E-10, or H-2, have the required period of Korean work experience within the recent review period, and meet the current skilled-worker points requirements. Employer recommendation, income, Korean ability, age, bonuses, and deductions are reviewed.
    D-10 connection: Finding a job does not by itself qualify you. The job must match an E-7-1 occupation and your degree or experience must meet that occupation's rules.
    E-9 connection: The usual E-7 change route for an E-9 holder is E-7-4. The current score, employment, income, Korean-language, and employer requirements must all be checked.
  subtypes: |-
    E-7-1 Professional — Managers and professional workers in occupations designated by the Ministry of Justice, such as certain IT, engineering, design, research, and overseas-sales roles. The exact occupation code controls the requirements.
    E-7-4 Skilled Worker — A points-based change route for experienced E-9, E-10, or H-2 workers in eligible industries. It evaluates Korean work history, employer recommendation, income, Korean ability, age, bonus points, and deductions.
    E-7-2 and E-7-3 also exist for designated semi-professional and general-skilled occupations, but they are outside the main scope of this guide.
  documents: |-
    E-7-1 | Common identity and application documents: integrated application form or visa documents for the route, passport, photo, and residence card if applying in Korea
    E-7-1 | Employment contract and documents identifying the employer, workplace, duties, salary, and employment period
    E-7-1 | Degree, career certificates, licenses, portfolio, or other evidence required by the exact occupation code
    E-7-1 | Employer documents such as business registration, tax and employment records, and a statement explaining the need for the role; a government recommendation may be required for some occupations
    E-7-4 | Common identity and application documents, employment contract, employer recommendation, and employer business and tax documents
    E-7-4 | Proof of eligible E-9, E-10, or H-2 work history, income records for the required period, and Korean-language evidence such as TOPIK or KIIP
    E-7-4 | Documents supporting the points claimed, including age, work history, qualifications, bonus points, and any deduction-related records
  steps: |-
    Identify the route first: E-7-1 professional employment or E-7-4 skilled-worker points route.
    Confirm the exact occupation or eligible industry and compare your employment contract, qualifications, work history, income, and Korean ability with the current rules.
    Prepare the applicant and employer documents. For an overseas E-7-1 case, the Korean employer commonly starts the Certificate of Visa Issuance process; a person already in Korea checks whether a change of status is available.
    Submit the application through the route confirmed by the Korean embassy, HiKorea, or the immigration office. Do not begin new work until the required status or permission is granted.
    After approval, report changes to the workplace, contract, address, passport, or registered information within the applicable deadline.
  watchout: |-
    E-7-1 and E-7-4 are not interchangeable. Keep their occupation, evidence, and score requirements in separate folders from the start.
    A D-10 holder is not automatically eligible for E-7-1 after receiving an offer. Confirm the Ministry of Justice occupation code before relying on the offer.
    An E-9 holder is generally restricted from changing to E-7 except through the E-7-4 skilled-worker route or another specifically permitted exception.
    Salary thresholds, the E-7-4 score table, annual quota, employer recommendation rules, and employer hiring limits can change. Confirm the version applying on your filing date.
    Work only at the approved workplace and in the approved activity. A workplace change or addition may require advance permission or a report.
  notes: |-
    For 2026, the Ministry of Justice announced separate salary thresholds for E-7-1 and E-7-4. Use the current annual notice rather than an older amount.
    The current E-7-4 framework reviews mandatory items and points together. Meeting a headline score alone does not replace the current work-history, employer, income, Korean-language, and disqualification checks.
    E-7 holders can generally invite a spouse and unmarried minor children under the applicable dependent-family rules, subject to the current requirements.
    This is a summary. Confirm the exact occupation code, current notice, and filing route with HiKorea, the 1345 Immigration Contact Center, or the immigration office before acting.
ko:
  title: E-7 취업 비자 — E-7-1 전문인력과 E-7-4 숙련기능인력
  summary: |-
    E-7은 법무부가 지정한 분야에서 일하기 위한 체류자격입니다. 이 안내에서는 MyanMate 이용자와 연관성이 큰 두 경로를 분리해 설명합니다. D-10 이후 전문 직종 취업을 위한 E-7-1과, E-9·E-10·H-2 경력자가 전환을 검토하는 E-7-4입니다. 직종, 고용조건, 증빙을 함께 심사합니다.
  eligibility: |-
    먼저 정확한 경로를 구분하세요. E-7-1과 E-7-4는 대상 직종, 자격요건, 심사기준이 서로 다릅니다.
    E-7-1: 법무부가 지정한 전문 직종의 고용계약이 있어야 합니다. 일반적인 자격 경로는 관련 분야 석사 이상, 관련 분야 학사와 1년 이상의 관련 경력, 또는 관련 분야 5년 이상의 경력 중 하나입니다. 직종별 별도 기준과 예외가 있을 수 있습니다.
    E-7-4: 현재 E-9·E-10·H-2로 합법 체류·근무 중이며, 최근 심사기간 안의 국내 근무경력과 숙련기능인력 점수제 요건을 충족해야 합니다. 기업 추천, 소득, 한국어 능력, 나이, 가점과 감점을 함께 심사합니다.
    D-10 연결: 취업이 확정됐다는 사실만으로 E-7-1 대상이 되지는 않습니다. 직무가 E-7-1 허용 직종에 해당하고 학력·경력이 그 직종 기준에 맞아야 합니다.
    E-9 연결: E-9 체류자가 일반적으로 검토하는 E-7 전환 경로는 E-7-4입니다. 최신 점수, 근무기간, 소득, 한국어, 기업 요건을 모두 확인해야 합니다.
  subtypes: |-
    E-7-1 전문인력 — IT·공학·디자인·연구·해외영업 등 법무부가 지정한 관리자·전문가 직종. 정확한 직종코드에 따라 요건이 결정됩니다.
    E-7-4 숙련기능인력 — 일정 기간 국내에서 근무한 E-9·E-10·H-2 체류자가 검토하는 점수제 전환 경로. 국내 근무경력, 기업 추천, 소득, 한국어, 나이, 가점과 감점을 평가합니다.
    E-7에는 지정된 준전문 직종의 E-7-2와 일반기능 직종의 E-7-3도 있지만, 이 안내의 중심 범위에서는 제외합니다.
  documents: |-
    E-7-1 | 공통 신분·신청 서류: 경로에 맞는 통합신청서 또는 사증 서류, 여권, 사진, 국내 신청 시 외국인등록증
    E-7-1 | 고용계약서와 고용기관·근무지·담당업무·임금·고용기간을 확인할 수 있는 자료
    E-7-1 | 정확한 직종코드에서 요구하는 학위증, 경력증명서, 자격증, 포트폴리오 등 자격 입증자료
    E-7-1 | 사업자등록, 납세·고용 현황, 고용 필요성 설명자료 등 고용기관 서류; 일부 직종은 관계 부처의 고용추천서가 필요할 수 있음
    E-7-4 | 공통 신분·신청 서류, 고용계약서, 기업 추천서, 사업자등록·납세 관련 기업 서류
    E-7-4 | E-9·E-10·H-2 국내 근무경력, 정해진 기간의 소득 입증, TOPIK·사회통합프로그램 등 한국어 능력 자료
    E-7-4 | 나이, 근무경력, 자격, 가점과 감점 등 신청 점수를 입증하는 자료
  steps: |-
    먼저 E-7-1 전문인력 경로인지 E-7-4 숙련기능인력 점수제 경로인지 구분합니다.
    정확한 직종 또는 허용 업종을 확인하고 고용계약, 학력·경력, 소득, 한국어 능력이 최신 기준에 맞는지 비교합니다.
    신청인과 고용기관 서류를 준비합니다. 해외 E-7-1 경로는 한국의 고용기관이 사증발급인정서 절차를 시작하는 경우가 일반적이며, 국내 체류자는 자격변경이 가능한지 확인합니다.
    재외공관·하이코리아·출입국에서 확인한 경로로 신청합니다. 필요한 체류자격이나 허가를 받기 전에 새로운 근무를 시작하지 마세요.
    허가 후 근무처, 계약, 체류지, 여권 또는 등록사항이 바뀌면 적용되는 기한 안에 허가·신고 여부를 확인합니다.
  watchout: |-
    E-7-1과 E-7-4를 하나의 요건처럼 섞지 마세요. 처음부터 직종·증빙·점수 자료를 별도로 정리하는 것이 안전합니다.
    D-10 체류자는 취업 제안을 받았더라도 자동으로 E-7-1이 되지 않습니다. 제안을 확정하기 전에 법무부 직종코드를 확인하세요.
    E-9 체류자는 원칙적으로 E-7 변경이 제한되며, 숙련기능인력 E-7-4 또는 별도로 허용된 예외 경로를 확인해야 합니다.
    임금 기준, E-7-4 배점표, 연간 선발규모, 기업 추천 요건과 기업별 고용한도는 바뀔 수 있습니다. 신청일에 적용되는 기준을 확인하세요.
    허가된 근무처와 활동 범위 안에서만 일해야 합니다. 근무처 변경·추가는 사전허가 또는 신고 대상일 수 있습니다.
  notes: |-
    법무부는 2026년 E-7-1과 E-7-4의 임금 기준을 별도로 공고했습니다. 이전 금액이 아니라 신청 시점의 연도별 공고를 사용하세요.
    현재 E-7-4는 의무요건과 점수를 함께 심사합니다. 점수만 충족해도 된다고 보지 말고 국내 경력, 기업, 소득, 한국어, 결격사유를 모두 확인하세요.
    E-7 체류자는 최신 동반가족 요건을 충족하면 배우자와 미혼 미성년 자녀의 동반 체류를 검토할 수 있습니다.
    본 정보는 요약입니다. 실제 진행 전 하이코리아, 1345 외국인종합안내센터 또는 관할 출입국·외국인관서에서 직종코드, 최신 공고와 신청 경로를 확인하세요.
my:
  title: E-7 အလုပ်ဗီဇာ — E-7-1 ပညာရှင်နှင့် E-7-4 ကျွမ်းကျင်လုပ်သား
  summary: |-
    E-7 သည် တရားရေးဝန်ကြီးဌာန သတ်မှတ်ထားသော အလုပ်နယ်ပယ်များတွင် အလုပ်လုပ်ရန် နေထိုင်ခွင့်ဖြစ်သည်။ ဤလမ်းညွှန်တွင် MyanMate အသုံးပြုသူများနှင့် ဆက်စပ်မှုများသော လမ်းကြောင်းနှစ်ခုကို သီးခြားရှင်းပြထားသည်။ D-10 ပြီးနောက် ပညာရှင်အလုပ်အတွက် E-7-1 နှင့် E-9၊ E-10 သို့မဟုတ် H-2 အတွေ့အကြုံရှိသူများအတွက် E-7-4 ဖြစ်သည်။
  eligibility: |-
    ပထမဦးစွာ သက်ဆိုင်ရာလမ်းကြောင်းကို ခွဲခြားပါ။ E-7-1 နှင့် E-7-4 ၏ အလုပ်အမျိုးအစား၊ အရည်အချင်းနှင့် စိစစ်မှုစံနှုန်း မတူပါ။
    E-7-1: တရားရေးဝန်ကြီးဌာန သတ်မှတ်ထားသော ပညာရှင်အလုပ်အတွက် အလုပ်စာချုပ် ရှိရမည်။ ယေဘုယျအားဖြင့် သက်ဆိုင်ရာ မဟာဘွဲ့အထက်၊ သက်ဆိုင်ရာ ဘွဲ့နှင့် အနည်းဆုံး ၁ နှစ်အတွေ့အကြုံ၊ သို့မဟုတ် သက်ဆိုင်ရာ ၅ နှစ်အတွေ့အကြုံ လမ်းကြောင်းတစ်ခုကို ပြည့်မီရမည်။ အလုပ်အလိုက် သီးခြားစည်းမျဉ်း ရှိနိုင်သည်။
    E-7-4: လက်ရှိ E-9၊ E-10 သို့မဟုတ် H-2 ဖြင့် တရားဝင်နေထိုင်အလုပ်လုပ်နေပြီး လတ်တလောသတ်မှတ်ကာလအတွင်း ကိုရီးယားအလုပ်အတွေ့အကြုံနှင့် လက်ရှိအမှတ်စနစ်ကို ပြည့်မီရမည်။ ကုမ္ပဏီထောက်ခံချက်၊ ဝင်ငွေ၊ ကိုရီးယားဘာသာ၊ အသက်၊ အပိုအမှတ်နှင့် လျှော့အမှတ်ကို စစ်ဆေးသည်။
    D-10 ဆက်စပ်မှု: အလုပ်ရခြင်းတစ်ခုတည်းဖြင့် E-7-1 မရနိုင်ပါ။ အလုပ်သည် ခွင့်ပြုထားသော E-7-1 အလုပ်ဖြစ်ပြီး ပညာရေး သို့မဟုတ် အတွေ့အကြုံစံနှုန်းနှင့် ကိုက်ညီရမည်။
    E-9 ဆက်စပ်မှု: E-9 ကိုင်ဆောင်သူအတွက် ယေဘုယျ E-7 ပြောင်းလဲမှုလမ်းကြောင်းမှာ E-7-4 ဖြစ်သည်။ လတ်တလော အမှတ်၊ အလုပ်ကာလ၊ ဝင်ငွေ၊ ကိုရီးယားဘာသာနှင့် ကုမ္ပဏီစံနှုန်းအားလုံးကို စစ်ဆေးပါ။
  subtypes: |-
    E-7-1 ပညာရှင် — IT၊ အင်ဂျင်နီယာ၊ ဒီဇိုင်း၊ သုတေသနနှင့် နိုင်ငံခြားအရောင်း စသည့် သတ်မှတ်ထားသော မန်နေဂျာနှင့် ပညာရှင်အလုပ်များ။ အတိအကျ အလုပ်ကုဒ်အလိုက် စံနှုန်းဆုံးဖြတ်သည်။
    E-7-4 ကျွမ်းကျင်လုပ်သား — ကိုရီးယားတွင် သတ်မှတ်ကာလ အလုပ်လုပ်ခဲ့သော E-9၊ E-10 သို့မဟုတ် H-2 ကိုင်ဆောင်သူများအတွက် အမှတ်စနစ် ပြောင်းလဲမှုလမ်းကြောင်း။
    E-7-2 နှင့် E-7-3 လည်း ရှိသော်လည်း ဤလမ်းညွှန်၏ အဓိကအကြောင်းအရာတွင် မပါဝင်ပါ။
  documents: |-
    E-7-1 | လျှောက်လွှာ၊ နိုင်ငံကူးလက်မှတ်၊ ဓာတ်ပုံနှင့် ကိုရီးယားတွင်လျှောက်လျှင် နိုင်ငံခြားသားမှတ်ပုံတင်ကတ်
    E-7-1 | အလုပ်စာချုပ်နှင့် အလုပ်ရှင်၊ အလုပ်နေရာ၊ တာဝန်၊ လစာ၊ အလုပ်ကာလကို ဖော်ပြသောစာရွက်များ
    E-7-1 | အလုပ်ကုဒ်အလိုက် လိုအပ်သော ဘွဲ့လက်မှတ်၊ အတွေ့အကြုံလက်မှတ်၊ လိုင်စင် သို့မဟုတ် portfolio
    E-7-1 | ကုမ္ပဏီမှတ်ပုံတင်၊ အခွန်နှင့် အလုပ်ခန့်ထားမှုစာရွက်များ၊ အလုပ်လိုအပ်ချက်ရှင်းလင်းချက်နှင့် လိုအပ်လျှင် အစိုးရထောက်ခံချက်
    E-7-4 | အခြေခံလျှောက်လွှာစာရွက်များ၊ အလုပ်စာချုပ်၊ ကုမ္ပဏီထောက်ခံစာနှင့် ကုမ္ပဏီအခွန်စာရွက်များ
    E-7-4 | E-9၊ E-10 သို့မဟုတ် H-2 အလုပ်အတွေ့အကြုံ၊ သတ်မှတ်ကာလဝင်ငွေ၊ TOPIK သို့မဟုတ် KIIP အထောက်အထား
    E-7-4 | အသက်၊ အလုပ်အတွေ့အကြုံ၊ အရည်အချင်း၊ အပိုအမှတ်နှင့် လျှော့အမှတ်ကို ထောက်ပြသောစာရွက်များ
  steps: |-
    E-7-1 ပညာရှင်လမ်းကြောင်း သို့မဟုတ် E-7-4 ကျွမ်းကျင်လုပ်သား အမှတ်လမ်းကြောင်းကို အရင်ခွဲခြားပါ။
    အတိအကျ အလုပ်ကုဒ် သို့မဟုတ် ခွင့်ပြုလုပ်ငန်းနှင့် အလုပ်စာချုပ်၊ ပညာရေး၊ အတွေ့အကြုံ၊ ဝင်ငွေ၊ ကိုရီးယားဘာသာကို လတ်တလောစည်းမျဉ်းနှင့် နှိုင်းယှဉ်ပါ။
    လျှောက်ထားသူနှင့် အလုပ်ရှင်စာရွက်များ ပြင်ဆင်ပါ။ ပြည်ပ E-7-1 လမ်းကြောင်းတွင် ကိုရီးယားအလုပ်ရှင်က ဗီဇာထုတ်ပေးမှုအတည်ပြုစာ လုပ်ငန်းစဉ်ကို စတင်လေ့ရှိသည်။
    သံရုံး၊ HiKorea သို့မဟုတ် လူဝင်မှုရုံးက အတည်ပြုသောလမ်းကြောင်းဖြင့် လျှောက်ပါ။ လိုအပ်သောခွင့်ပြုချက်မရမီ အလုပ်အသစ် မစတင်ပါနှင့်။
    ခွင့်ပြုပြီးနောက် အလုပ်နေရာ၊ စာချုပ်၊ နေရပ်၊ နိုင်ငံကူးလက်မှတ် သို့မဟုတ် မှတ်ပုံတင်အချက်အလက် ပြောင်းလဲပါက သတ်မှတ်ကာလအတွင်း စစ်ဆေးတင်ပြပါ။
  watchout: |-
    E-7-1 နှင့် E-7-4 ကို တစ်မျိုးတည်းဟု မယူဆပါနှင့်။ အလုပ်၊ သက်သေစာရွက်နှင့် အမှတ်စာရွက်များကို အစကတည်းက ခွဲထားပါ။
    D-10 ကိုင်ဆောင်သူသည် အလုပ်ကမ်းလှမ်းချက်ရသော်လည်း E-7-1 အလိုအလျောက် မရပါ။ အလုပ်ကုဒ်ကို အရင်စစ်ပါ။
    E-9 မှ E-7 ပြောင်းခြင်းသည် ယေဘုယျအားဖြင့် ကန့်သတ်ထားပြီး E-7-4 သို့မဟုတ် သီးခြားခွင့်ပြုလမ်းကြောင်းကို စစ်ရမည်။
    လစာစံနှုန်း၊ E-7-4 အမှတ်ဇယား၊ နှစ်စဉ်အရေအတွက်နှင့် ကုမ္ပဏီစည်းမျဉ်းများ ပြောင်းနိုင်သည်။ လျှောက်သည့်နေ့တွင် အတည်ပြုပါ။
    ခွင့်ပြုထားသော အလုပ်နေရာနှင့် လုပ်ငန်းအတွင်းသာ အလုပ်လုပ်ပါ။ အလုပ်နေရာပြောင်းခြင်း သို့မဟုတ် ထပ်ထည့်ခြင်းအတွက် ကြိုတင်ခွင့်ပြုချက် သို့မဟုတ် တင်ပြချက် လိုနိုင်သည်။
  notes: |-
    ၂၀၂၆ ခုနှစ်အတွက် E-7-1 နှင့် E-7-4 လစာစံနှုန်းကို သီးခြားကြေညာထားသည်။ အဟောင်းပမာဏမဟုတ်ဘဲ လျှောက်ချိန်၏ နှစ်စဉ်ကြေညာချက်ကို အသုံးပြုပါ။
    E-7-4 တွင် မဖြစ်မနေစံနှုန်းနှင့် အမှတ်ကို အတူစစ်သည်။ အမှတ်တစ်ခုတည်းမဟုတ်ဘဲ အလုပ်သက်တမ်း၊ ကုမ္ပဏီ၊ ဝင်ငွေ၊ ကိုရီးယားဘာသာနှင့် ပိတ်ပင်ချက်များကို စစ်ပါ။
    E-7 ကိုင်ဆောင်သူသည် လတ်တလောမိသားစုစံနှုန်းပြည့်မီပါက အိမ်ထောင်ဖက်နှင့် အရွယ်မရောက်သေးသော အိမ်ထောင်မရှိသားသမီးကို အတူနေထိုင်ရန် စဉ်းစားနိုင်သည်။
    ဤအချက်အလက်သည် အကျဉ်းချုပ်ဖြစ်သည်။ မလုပ်မီ HiKorea၊ 1345 သို့မဟုတ် သက်ဆိုင်ရာ လူဝင်မှုရုံးတွင် အလုပ်ကုဒ်၊ လတ်တလောကြေညာချက်နှင့် လျှောက်လမ်းကို အတည်ပြုပါ။
