title: D-4 Language Visa
category: visa
order: 2
lastReviewed: 2026-05-21
en:
  title: D-4 Language Training Visa — study Korean at a university institute
  summary: >-
    D-4 (D-4-1 Korean / D-4-7 other languages) is for language training at a
    university-attached language institute (어학당). Who it fits, the documents,
    and how it differs from D-2.
  eligibility: >-
    You hold at least a high-school diploma and will study Korean at a language
    institute attached to an accredited (junior college or above) university.

    Lifelong-education centers and private academies (학원) are not eligible for
    D-4.

    Courses run on weekdays, in the daytime, at least 15 hours/week (300+ hours
    per term). Programs of 90 days or less use a short-stay C-3-1 visa instead.
  subtypes: >-
    D-4-1 Korean Language Training — Korean-language training at language
    institutes affiliated with junior colleges or higher

    D-4-2 General Training — Graduate training, foreign-invested-company
    internships, etc.

    D-4-3 K-12 Student — Elementary, middle, high schools, foreign schools,
    alternative schools

    D-4-5 Korean Culinary Trainee — Korean cuisine trainees recommended by aT
    (Korea Agro-Fisheries & Food Trade Corp.)

    D-4-6 Private-Institute Trainee — Trainees at certified private
    vocational/technical training institutes (age 18-30)

    D-4-7 Foreign Language Training — Foreign-language (English, etc.) training,
    including high-school-and-below students
  documents: >-
    Visa application form (Form 17), passport, one standard photo, fee

    Certificate of admission (표준입학허가서) from the university president

    The institute's business registration certificate (copy)

    Enrolment certificate or proof of your last academic record

    Proof of finances — a bank-balance certificate (valid only if issued within
    30 days), bankbook, or scholarship letter, covering about 1 year (6 months
    for language study) of tuition and living costs; if a parent's balance is
    used, add a family-relationship certificate

    A study plan (timetable, instructors, facilities)
  steps: >-
    Enrol and pay the deposit at a university language institute to get your
    certificate of admission.

    Prepare the documents above (verify academic and financial records where
    required).

    Apply at the Korean embassy or consulate in your country — D-4 for language
    study is a single-entry visa for 6 months or less.

    After entry, complete foreign-resident registration if your stay exceeds 90
    days.
  watchout: >-
    Some nationalities and cases require a Certificate of Confirmation of Visa
    Issuance (사증발급인정서) instead of applying directly.

    Attendance matters — institutes track it, and low attendance can affect your
    status and extensions.

    A bank-balance certificate is usually valid only within 30 days — confirm
    the current required amount on HiKorea.
  notes: >-
    Maximum stay per issuance: 2 years (D-4-6 general training is capped at 1
    year from entry)

    Part-time work can be requested after 6 months on D-4. School confirmation
    and immigration permission are required. Allowed hours vary by course,
    Korean ability, and current guidance

    School transfers in principle require leaving and re-applying. Exceptions:
    language institute closure, or TOPIK Level 3+ with valid reason (transfer
    only to general universities or above)

    Leave of absence: restricted for personal/family reasons or low GPA; only
    illness/accident exempted

    Re-entry within 1 year is exempt; 1-2 years requires multi-entry permit (D-4
    holders from Saudi Arabia, Iran, Libya CAN obtain multi-entry)

    Report changes to name, sex, birth date, nationality, passport, or
    affiliated organization within 15 days

    D-4-6 trainees can do field training after 6 months + TOPIK Level 2 + 90%
    attendance (max 28 hrs/week, no activity after 9 PM)

    D-4-6 trainees who complete 20+ months + obtain Korean certification +
    finish KIIP Stage 4 may change to E-7 (excluding E-7-4)

    Language training of 90 days or less falls under Short-Term General visa
    (C-3-1), NOT D-4

    K-Trainee internship (D-4-2K) is a 9-country pilot — Myanmar nationals are
    NOT eligible

    This is a summary. Contact the 1345 Foreign Resident Hotline or your local
    Immigration Office for actual applications
ko:
  title: D-4 어학연수 비자 — 대학 부설 어학당에서 한국어
  summary: >-
    D-4(D-4-1 한국어 / D-4-7 외국어)는 대학 부설 어학당(어학원)에서 어학연수를 하기 위한 비자입니다. 누구에게 맞는지,
    서류, D-2와의 차이를 정리했어요.
  eligibility: |-
    고등학교 졸업 이상 학력 소지자로, 인가된(전문대학 이상) 대학 부설 어학원에서 한국어를 배우려는 분.
    평생교육시설·사설학원은 D-4 대상이 아닙니다.
    수업은 주중·주간에 주 15시간 이상(반기 300시간 이상) 운영됩니다. 90일 이하 과정은 단기일반(C-3-1) 사증 대상.
  subtypes: |-
    D-4-1 어학연수 — 대학(전문대 이상) 부설 어학원의 한국어 연수
    D-4-2 일반연수 — 졸업생 연수, 외국인투자기업 인턴 등
    D-4-3 초·중·고 유학 — 초·중·고등학교, 외국인학교, 대안학교 유학
    D-4-5 한식조리연수 — aT(한국농수산식품유통공사) 추천 한식 조리 연수생
    D-4-6 사설 교육기관 연수 — 전문기술·직업기술 분야 우수사설 교육기관 연수 (만 18~30세)
    D-4-7 외국어연수 — 영어 등 외국어 연수 (고등학교 이하 학생도 가능)
  documents: >-
    사증발급신청서(별지 제17호), 여권, 표준규격사진 1매, 수수료

    표준입학허가서(대학 총·학장 발행)

    교육기관 사업자등록증 사본

    재학증명서 또는 최종학력 입증서류

    재정 입증서류 — 잔고증명서(30일 이내 발급분만 유효), 통장, 장학금증명서 등으로 1년(어학연수는 6개월)간 등록금+체재비; 부모
    잔고를 제출하면 가족관계증명서 추가

    연수계획서(강의시간표·강사·시설 포함)
  steps: |-
    대학 어학원에 등록·납입하고 표준입학허가서를 받습니다.
    위 서류를 준비합니다(필요 시 학력·재정 서류 확인).
    본국의 대한민국 대사관·영사관에서 신청합니다 — 어학연수 D-4는 체류 6개월 이하 단수 사증입니다.
    입국 후 체류가 90일을 넘으면 외국인등록을 합니다.
  watchout: |-
    일부 국가·경우는 직접 신청이 아니라 사증발급인정서로만 발급됩니다.
    출석이 중요합니다 — 어학원이 출석을 관리하며 출석률이 낮으면 체류·연장에 영향을 줄 수 있어요.
    잔고증명서는 보통 30일 이내 발급분만 유효합니다 — 필요 금액 기준은 하이코리아에서 확인하세요.
  notes: >-
    1회 부여 체류기간 상한: 2년 (D-4-6 일반연수는 입국일로부터 최대 1년)

    시간제 취업은 D-4 취득 후 6개월이 지나야 신청할 수 있으며, 학교 확인과 출입국 허가가 필요합니다. 허용 시간은 과정·한국어
    능력·최신 지침에 따라 달라지므로 신청 전 확인하세요.

    학교 변경은 원칙적으로 출국 후 재사증. 어학원 폐쇄 또는 TOPIK 3급+정당사유 시 일반대 이상 변경 예외 허용

    휴학: 가사·개인사정·학점미달은 연장 제한, 질병·사고만 예외

    1년 이내 재입국은 허가 면제, 1~2년은 복수재입국허가 필요 (사우디·이란·리비아 D-4는 복수재입국 가능)

    성명·성별·생년월일·국적·여권·소속기관 변경 시 15일 이내 신고

    D-4-6 우수사설은 6개월+TOPIK 2급+출석률 90% 이상 시 현장실습 가능 (주 28시간, 21시 이후 금지)

    D-4-6 20개월 이상 수료 + 국내 자격증 + 사회통합프로그램 4단계 이상 시 E-7 자격변경 가능 (E-7-4 제외)

    90일 이하 단기 어학연수는 D-4가 아닌 단기일반(C-3-1) 사증 대상

    K-Trainee 인턴십(D-4-2K)은 9개국 시범 프로그램으로 미얀마 국적은 신청 대상이 아님

    본 정보는 요약이며, 1345 외국인종합안내센터 또는 관할 출입국·외국인관서에 확인하세요
my:
  title: >-
    D-4 ဘာသာစကားသင်တန်းဗီဇာ — တက္ကသိုလ်ဘာသာစကားသင်တန်းတွင်
    ကိုရီးယားဘာသာသင်ယူခြင်း
  summary: >-
    D-4 (D-4-1 ကိုရီးယား / D-4-7 အခြားဘာသာစကား) သည် တက္ကသိုလ်တွဲဖက်
    ဘာသာစကားသင်တန်း (어학당) တွင် ဘာသာစကား သင်ယူရန်ဖြစ်သည်။ ဘယ်သူနှင့်သင့်တော်လဲ၊
    စာရွက်စာတမ်း၊ D-2ဗီဇာ နှင့် ကွာခြားချက်များ
  eligibility: >-
    အထက်တန်းအောင်လက်မှတ် အနည်းဆုံးရှိပြီး အသိအမှတ်ပြု တက္ကသိုလ်တွဲဖက်
    ဘာသာစကားသင်တန်းတွင် ကိုရီးယားဘာသာ သင်ယူမည့်သူ။

    တစ်သက်တာပညာရေးဌာနများနှင့် ပုဂ္ဂလိက သင်တန်းများသည် D-4 အတွက် အကျုံးမဝင်ပါ။

    သင်တန်းများကို ရက်သတ္တပတ်၊ တစ်ပတ် ၁၅ နာရီအထက် ပို့ချသည်။  ရက် ၉၀ အောက်ဆိုပါက
    C-3-1 ဗီဇာ သုံးသည်။
  subtypes: >-
    D-4-1  — တက္ကသိုလ် (Junior College အထက်) တွဲဖက် ဘာသာစကား သင်တန်းတွင်
    ကိုရီးယားဘာသာ လေ့လာခြင်း

    D-4-2 — ဘွဲ့ရ ပြီးနောက် သင်တန်း၊ နိုင်ငံခြား ရင်းနှီးမြှုပ်နှံမှု ကုမ္ပဏီ
    အလုပ်သင် အစရှိသည်

    D-4-3  — မူလတန်း၊ အလယ်တန်း၊ အထက်တန်း၊ နိုင်ငံခြား ကျောင်း၊
    အခြားသက်ဆိုင်ရာကျောင်းများ

    D-4-5  — aT(ကိုရီးယား စိုက်ပျိုးရေး·ရေထွက်ကုန် ကုန်စည် ကုမ္ပဏီ) ထောက်ခံ
    ကိုရီးယား အစားအသောက် သင်တန်းသား

    D-4-6  — အသိအမှတ်ပြု ပုဂ္ဂလိက အသက်မွေးဝမ်းကျောင်း သင်တန်း (အသက် ၁၈-၃၀)

    D-4-7  — အင်္ဂလိပ် စသည့် နိုင်ငံခြားဘာသာ သင်တန်း 
  documents: >-
    ဗီဇာလျှောက်လွှာ (ပုံစံ ၁၇)၊ နိုင်ငံကူးလက်မှတ်၊ ဓာတ်ပုံ ၁ ပုံ၊ အခကြေးငွေ

    ဝင်ခွင့်လက်မှတ် (표준입학허가서၊ တက္ကသိုလ်ပါမောက္ခချုပ် ထုတ်ပေးသော)

    သင်တန်း၏ စီးပွားရေးမှတ်ပုံတင်လက်မှတ် မိတ္တူ

    ကျောင်းတက်နေကြောင်း လက်မှတ် သို့မဟုတ် နောက်ဆုံးပညာအရည်အချင်း အထောက်အထား

    ငွေကြေး အထောက်အထား — ဘဏ်လက်ကျန် ထောက်ခံစာ (၃၀ ရက်အတွင်း ထုတ်မှ တရားဝင်)၊
    ဘဏ်စာအုပ်၊ ပညာသင်ဆုစာ၊ ၁ နှစ် (ဘာသာစကားအတွက် ၆ လ) ကျောင်းလခ+နေထိုင်စရိတ်;
    မိဘထောက်ပံ့မှုဆိုပါက မိသားစုဆက်နွယ်မှု လက်မှတ်

    သင်ယူမှု အစီအစဉ် (Study Plan)
  steps: >-
    တက္ကသိုလ်ဘာသာစကားသင်တန်းတွင် စာရင်းသွင်း၍ ဝင်ခွင့်လက်မှတ် ရယူပါ။

    အထက်ပါ စာရွက်များ ပြင်ဆင်ပါ (လိုအပ်ပါက ပညာ/ငွေကြေး စာရွက် အတည်ပြုပါ)။

    သင့်နိုင်ငံရှိ ကိုရီးယားသံရုံး/ကောင်စစ်ဝန်ရုံးတွင် လျှောက်ပါ — ဘာသာစကား D-4
    သည် ၆ လအောက် single-entry ဗီဇာ။

    ဝင်ရောက်ပြီးနောက် ၉၀ ရက်ကျော်နေထိုင်ပါက နိုင်ငံခြားသား မှတ်ပုံတင်ပါ။
  watchout: >-
    အချို့နိုင်ငံသား/အခြေအနေများတွင် တိုက်ရိုက်လျှောက်ခြင်းအစား ဗီဇာထုတ်ပေးမှု
    အတည်ပြုလက်မှတ် (사증발급인정서) လိုသည်။

    တက်ရောက်မှု အရေးကြီးသည် — သင်တန်းက မှတ်တမ်းတင်ပြီး တက်ရောက်မှုနည်းပါက
    သင့်အခြေအနေကို ထိခိုက်နိုင်သည်။

    ဘဏ်လက်ကျန် ထောက်ခံစာသည် ၃၀ ရက်အတွင်းသာ တရားဝင် — လိုအပ်သော ပမာဏကို HiKorea
    တွင် အတည်ပြုပါ။
  notes: >-
    တစ်ကြိမ်ပေးအပ်သော နေထိုင်ခွင့် အများဆုံး: ၂ နှစ် (D-4-6 အထွေထွေ သင်တန်း —
    ဝင်ရောက်ပြီးနောက် အများဆုံး ၁ နှစ်)

    အချိန်ပိုင်း အလုပ်ကို D-4 ရပြီး ၆ လကျော်မှ လျှောက်နိုင်သည်။
    ကျောင်းအတည်ပြုချက်နှင့် လူဝင်မှုကြီးကြပ်ရေးခွင့်ပြုချက် လိုအပ်ပြီး၊
    ခွင့်ပြုနာရီသည် သင်တန်း၊ ကိုရီးယားဘာသာစွမ်းရည်နှင့်
    နောက်ဆုံးလမ်းညွှန်ချက်အပေါ် မူတည်သည်

    ကျောင်း ပြောင်းခြင်း — မူအရ ပြင်ပ ထွက်ပြီး ဗီဇာ ပြန်လုပ်။ ဘာသာစကား သင်တန်း
    ပိတ်သိမ်း သို့မဟုတ် TOPIK ၃+သင့်တင့်သော အကြောင်း ရှိပါက အထွေထွေ တက္ကသိုလ်
    အထက်သို့ ခြွင်းချက် ပြောင်းခွင့်

    ခွင့်ယူခြင်း — မိသားစု·ကိုယ်ရေး·ရမှတ် မပြည့်မီ — တိုးမြှင့် ကန့်သတ်၊
    ဖျားနာ·မတော်တဆ သာ ခြွင်းချက်

    ၁ နှစ်အတွင်း ပြန်ဝင်ခြင်း ကင်းလွတ်၊ ၁-၂ နှစ် အကြိမ်များ ပြန်ဝင်ခွင့် လို
    (ဆော်ဒီ·အီရန်·လစ်ဗျား နိုင်ငံသား D-4 — အကြိမ်များ ပြန်ဝင်ခွင့် ရ)

    အမည်·လိင်·မွေးနေ့·နိုင်ငံသား·ပတ်စပို့·သက်ဆိုင်ရာ အဖွဲ့အစည်း ပြောင်းပါက ၁၅
    ရက်အတွင်း သတင်းပို့ရန်

    D-4-6 — ၆ လ + TOPIK ၂ + တက်ရောက်မှု ၉၀% အထက် ဖြစ်ပါက လက်တွေ့ အလုပ်သင် ရ (၂၈
    နာရီ/ပတ်၊ ည ၉ နာရီ နောက်ပိုင်း မရ)

    D-4-6 — ၂၀ လ အထက် ပြီးဆုံး + ပြည်တွင်း လက်မှတ် + KIIP အဆင့် ၄ ပြီးဆုံး ပါက
    E-7 ပြောင်းခွင့် ရနိုင် (E-7-4 မပါ)

    ရက် ၉၀ အောက် ဘာသာစကား သင်တန်းသည် D-4 မဟုတ်ဘဲ ရေတိုသာမန် (C-3-1) ဗီဇာ
    အကျုံးဝင်

    K-Trainee အလုပ်သင် (D-4-2K) သည် နိုင်ငံ ၉ နိုင်ငံ စမ်းသပ် ပရိုဂရမ် ဖြစ်ပြီး
    မြန်မာ နိုင်ငံသား မပါဝင်

    ဤ အချက်အလက်များသည် အကျဉ်းချုပ်သာ ဖြစ်သည်။ 1345 နိုင်ငံခြားသား ဆက်သွယ်ရေး
