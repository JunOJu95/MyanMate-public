title: F-2 Resident Visa
category: visa
order: 6
lastReviewed: 2026-07-19
en:
  title: F-2 Resident Visa — F-2-7 points-based talent
  summary: |-
    F-2 includes several residence routes. This guide focuses on F-2-7, which reviews eligible talent through a points system and additional conduct, employment, and public-health requirements. Check your applicant group first, then prepare evidence for every point you claim.
  eligibility: |-
    F-2-7 is not open to every long-term resident. You must first fit a current applicant group and then meet the current points and review requirements.
    Listed-company employee: employed by a company listed on KOSPI or KOSDAQ.
    Promising-industry employee: employed in a designated field such as IT, technology management, nano, digital electronics, bio, transport and machinery, new materials, environment, or energy, with the required income.
    Professional employee: continuously stayed in an eligible D-5 to D-9 or E-1 to E-7-1 status for the required period. E-6-2 is excluded.
    Student talent: a person with an eligible Korean master's degree or higher, or another specifically recognized study-talent route.
    Potential talent: a master's or doctoral degree holder or expected graduate from a designated science-and-technology university or research institute, under the applicable special route.
    In every route, the current score, good-conduct, lawful employment, and public-health requirements must also be met.
  subtypes: |-
    F-2-7 Points-Based Talent — Eligible listed-company, promising-industry, professional, student, or potential talent who meets the current score and additional requirements
    F-2-7S Potential Talent — A special science-and-technology talent route for eligible master's or doctoral graduates or expected graduates of designated institutions
    Other F-2 routes — Family, refugee, investor, public-interest investment, long-term resident (F-2-99), and other residence categories have separate rules and are not covered in detail here
  documents: |-
    Integrated application form, passport, photo, residence card, fee, and proof of address
    A points calculation sheet using the current table, with evidence for every claimed item
    Employment certificate and employment contract showing the employer, occupation, work period, and income
    Income certificate and other tax records required for your applicant group
    Degree, graduation, career, license, company-listing, or promising-industry evidence that proves your applicant group
    TOPIK, KIIP, or other accepted Korean-language and social-integration evidence
    Documents for bonus points and deductions, plus criminal-record or health documents if requested for your case
  steps: |-
    Identify which F-2-7 applicant group you fit. Do not calculate points before confirming this first gate.
    Download or confirm the current points table and applicant-group rules through HiKorea or the 1345 Immigration Contact Center.
    Calculate your score conservatively and attach official evidence for every education, income, Korean-language, age, work-history, and bonus item claimed.
    While legally staying in Korea, reserve a visit if required and apply for a change of status at the immigration office or through an available HiKorea procedure.
    After approval, keep employment, income, address, passport, and registration information current and prepare updated evidence for the next extension.
  watchout: |-
    The applicant group and the points test are separate gates. A high score does not help if you do not fit a current applicant group.
    For the professional-employee route, time spent on D-2 or D-10 is generally not added to the required professional-status period. Current income-based or government-recommendation exceptions should be checked separately.
    The score table, national-income-linked thresholds, eligible industries, and required stay period can change. Use the rules in force on your application date.
    A change of employer, occupation, or income may affect an extension. Keep contracts, income records, and immigration reports consistent.
    F-2-7 offers a wider range of activities than many work statuses, but it does not remove every reporting duty or restriction. Confirm before changing work or starting a business.
  notes: |-
    Points commonly cover age, education, Korean ability, income, and other contribution or integration factors, with bonus and deduction items. Do not rely on an old online calculator.
    A points-based F-2 holder may be able to invite a spouse and unmarried minor children under F-2 if the principal holder meets the current income rule; otherwise a different family status may apply. F-2-7S has a separate family exception.
    A points-based F-2 holder may later review the points-based permanent-residence route after the required period, but separate conduct, livelihood, and integration requirements apply.
    This is a summary. Confirm your applicant group, current score table, and evidence list with HiKorea, 1345, or the immigration office before applying.
ko:
  title: F-2 거주 비자 — F-2-7 점수제 우수인재 중심
  summary: |-
    F-2에는 여러 거주 경로가 있습니다. 이 안내는 그중 신청 대상에 해당하는 우수인재를 점수제와 품행·취업활동·공중보건 요건으로 심사하는 F-2-7을 중심으로 설명합니다. 먼저 본인의 신청 대상 유형을 확인한 뒤, 주장하는 점수마다 증빙을 준비해야 합니다.
  eligibility: |-
    F-2-7은 모든 장기체류자가 신청할 수 있는 자격이 아닙니다. 먼저 현재 지침의 신청 대상 유형 중 하나에 해당하고, 점수와 추가 심사요건을 충족해야 합니다.
    상장법인 종사자: KOSPI 또는 KOSDAQ 상장법인에 근무하는 사람.
    유망산업 종사자: IT·기술경영·나노·디지털전자·바이오·수송 및 기계·신소재·환경 및 에너지 등 지정 분야에 종사하며 소득 요건을 충족하는 사람.
    전문직 종사자: D-5~D-9 또는 E-1~E-7-1 중 허용 자격으로 정해진 기간 동안 계속 체류한 사람. E-6-2는 제외됩니다.
    유학인재: 국내 석사 이상 학위 소지자 또는 별도로 인정되는 유학 우수인재 경로에 해당하는 사람.
    잠재적 우수인재: 지정된 이공계 특성화 대학·연구기관의 석·박사 학위 취득자 또는 취득예정자로서 별도 특례 요건에 해당하는 사람.
    모든 경로에서 최신 점수, 품행단정, 적법한 취업활동, 공중보건 요건도 함께 충족해야 합니다.
  subtypes: |-
    F-2-7 점수제 우수인재 — 상장법인·유망산업·전문직·유학인재·잠재적 우수인재 중 신청 대상에 해당하고 최신 점수와 추가요건을 충족하는 사람
    F-2-7S 잠재적 우수인재 — 지정 이공계 특성화 기관의 석·박사 학위 취득자·취득예정자를 위한 과학기술인재 특례 경로
    그 밖의 F-2 — 가족, 난민, 투자, 공익사업 투자, 장기체류자(F-2-99) 등은 서로 다른 요건이 적용되며 이 안내에서는 자세히 다루지 않습니다.
  documents: |-
    통합신청서, 여권, 사진, 외국인등록증, 수수료, 체류지 입증서류
    최신 배점표로 작성한 점수표와 각 점수 항목의 입증서류
    고용기관, 직종, 근무기간, 소득을 확인할 수 있는 재직증명서와 고용계약서
    신청 대상 유형에서 요구하는 소득금액증명과 납세 관련 자료
    신청 대상 유형을 입증하는 학위·졸업·경력·자격·상장법인·유망산업 관련 자료
    TOPIK·사회통합프로그램 등 인정되는 한국어와 사회통합 입증자료
    가점·감점 관련 자료와, 본인 사례에서 요청되는 경우 범죄경력·건강 관련 자료
  steps: |-
    본인이 어떤 F-2-7 신청 대상 유형에 해당하는지 먼저 확인합니다. 이 첫 조건을 확인하기 전에 점수부터 계산하지 마세요.
    하이코리아 또는 1345에서 현재 배점표와 신청 대상 유형별 기준을 확인합니다.
    점수를 보수적으로 계산하고 학력, 소득, 한국어, 나이, 근무경력, 가점 항목마다 공적 증빙을 준비합니다.
    국내에 적법하게 체류 중인 상태에서 필요한 경우 방문예약을 하고, 관할 출입국 또는 이용 가능한 하이코리아 절차로 자격변경을 신청합니다.
    허가 후 고용, 소득, 체류지, 여권과 등록정보를 최신 상태로 유지하고 다음 연장 때 필요한 자료를 다시 준비합니다.
  watchout: |-
    신청 대상 유형과 점수 기준은 별개의 문턱입니다. 점수가 높더라도 현재 신청 대상 유형에 해당하지 않으면 진행하기 어렵습니다.
    전문직 종사자 경로에서 D-2·D-10 체류기간은 일반적으로 요구되는 전문직 체류기간에 합산되지 않습니다. 소득 또는 정부 추천에 따른 최신 면제 조건은 별도로 확인하세요.
    배점표, 국민총소득과 연동된 기준, 유망산업 범위, 요구 체류기간은 바뀔 수 있습니다. 신청일에 시행 중인 지침을 사용하세요.
    고용기관, 직종 또는 소득이 바뀌면 연장 심사에 영향을 줄 수 있습니다. 계약서, 소득자료와 출입국 신고 내용을 일치시켜 관리하세요.
    F-2-7은 여러 취업 자격보다 활동 범위가 넓지만 모든 신고의무와 제한이 사라지는 것은 아닙니다. 이직이나 사업 시작 전에 확인하세요.
  notes: |-
    배점은 일반적으로 나이, 학력, 한국어 능력, 소득, 사회통합·기여 요소와 가점·감점 항목으로 구성됩니다. 오래된 온라인 계산기만 믿지 마세요.
    주 체류자가 현재 소득 요건을 충족하면 배우자와 미혼 미성년 자녀가 F-2 동반 체류를 검토할 수 있고, 미충족하면 다른 가족 체류자격이 적용될 수 있습니다. F-2-7S는 별도 가족 특례가 있습니다.
    점수제 F-2 체류자는 정해진 기간 이후 점수제 영주 경로를 검토할 수 있지만 품행, 생계유지, 기본소양 등 별도 요건이 적용됩니다.
    본 정보는 요약입니다. 신청 전 하이코리아, 1345 또는 관할 출입국·외국인관서에서 신청 대상 유형, 최신 배점표와 증빙 목록을 확인하세요.
my:
  title: F-2 နေထိုင်ခွင့်ဗီဇာ — F-2-7 အမှတ်စနစ် ထူးချွန်သူ
  summary: |-
    F-2 တွင် နေထိုင်ခွင့်လမ်းကြောင်းများစွာ ရှိသည်။ ဤလမ်းညွှန်သည် သတ်မှတ်အရည်အချင်းရှိသူကို အမှတ်စနစ်၊ အကျင့်စာရိတ္တ၊ အလုပ်နှင့် ကျန်းမာရေးစံနှုန်းများဖြင့် စစ်ဆေးသော F-2-7 ကို အဓိကရှင်းပြထားသည်။ ပထမဦးစွာ မိမိ၏ လျှောက်ထားသူအုပ်စုကို စစ်ပြီး တောင်းဆိုသည့်အမှတ်တိုင်းအတွက် အထောက်အထား ပြင်ဆင်ပါ။
  eligibility: |-
    F-2-7 ကို ရေရှည်နေထိုင်သူတိုင်း လျှောက်နိုင်ခြင်းမဟုတ်ပါ။ လက်ရှိသတ်မှတ်ထားသော လျှောက်ထားသူအုပ်စုတစ်ခုနှင့် ကိုက်ညီပြီး အမှတ်နှင့် အပိုစံနှုန်းများ ပြည့်မီရမည်။
    စာရင်းဝင်ကုမ္ပဏီဝန်ထမ်း: KOSPI သို့မဟုတ် KOSDAQ စာရင်းဝင်ကုမ္ပဏီတွင် အလုပ်လုပ်သူ။
    အလားအလာရှိလုပ်ငန်းဝန်ထမ်း: IT၊ နည်းပညာစီမံခန့်ခွဲမှု၊ နာနို၊ ဒစ်ဂျစ်တယ်အီလက်ထရွန်းနစ်၊ ဇီဝ၊ သယ်ယူပို့ဆောင်ရေးနှင့် စက်မှု၊ ပစ္စည်းအသစ်၊ ပတ်ဝန်းကျင်နှင့် စွမ်းအင် စသည့် သတ်မှတ်နယ်ပယ်တွင် အလုပ်လုပ်ပြီး ဝင်ငွေစံနှုန်းပြည့်သူ။
    ပညာရှင်ဝန်ထမ်း: ခွင့်ပြုထားသော D-5 မှ D-9 သို့မဟုတ် E-1 မှ E-7-1 နေထိုင်ခွင့်ဖြင့် သတ်မှတ်ကာလ ဆက်တိုက်နေထိုင်သူ။ E-6-2 မပါဝင်ပါ။
    ပညာသင်ထူးချွန်သူ: ကိုရီးယား မဟာဘွဲ့အထက် သို့မဟုတ် သီးခြားအသိအမှတ်ပြုထားသော ပညာသင်လမ်းကြောင်းနှင့် ကိုက်ညီသူ။
    အလားအလာရှိထူးချွန်သူ: သတ်မှတ် သိပ္ပံနှင့် နည်းပညာ တက္ကသိုလ် သို့မဟုတ် သုတေသနဌာနမှ မဟာဘွဲ့၊ ပါရဂူဘွဲ့ ရရှိသူ သို့မဟုတ် ရရှိမည့်သူ။
    လမ်းကြောင်းအားလုံးတွင် လတ်တလောအမှတ်၊ အကျင့်စာရိတ္တ၊ တရားဝင်အလုပ်နှင့် ကျန်းမာရေးစံနှုန်းကိုလည်း ဖြည့်ရမည်။
  subtypes: |-
    F-2-7 အမှတ်စနစ် ထူးချွန်သူ — သတ်မှတ်ထားသော ကုမ္ပဏီ၊ အလားအလာရှိလုပ်ငန်း၊ ပညာရှင်၊ ပညာသင် သို့မဟုတ် အလားအလာရှိထူးချွန်သူအုပ်စုနှင့် ကိုက်ညီပြီး လတ်တလောအမှတ်နှင့် အပိုစံနှုန်းများ ပြည့်သူ
    F-2-7S အလားအလာရှိထူးချွန်သူ — သတ်မှတ် သိပ္ပံနည်းပညာဌာန၏ မဟာဘွဲ့ သို့မဟုတ် ပါရဂူဘွဲ့ ရရှိသူ/ရရှိမည့်သူများအတွက် အထူးလမ်းကြောင်း
    အခြား F-2 — မိသားစု၊ ဒုက္ခသည်၊ ရင်းနှီးမြှုပ်နှံမှု၊ အများပြည်သူအကျိုး ရင်းနှီးမြှုပ်နှံမှုနှင့် F-2-99 တို့တွင် သီးခြားစည်းမျဉ်းရှိပြီး ဤနေရာတွင် အသေးစိတ်မဖော်ပြပါ။
  documents: |-
    လျှောက်လွှာ၊ နိုင်ငံကူးလက်မှတ်၊ ဓာတ်ပုံ၊ နိုင်ငံခြားသားမှတ်ပုံတင်ကတ်၊ အခကြေးငွေနှင့် နေရပ်အထောက်အထား
    လက်ရှိအမှတ်ဇယားဖြင့် တွက်ချက်ထားသော အမှတ်စာရွက်နှင့် အမှတ်တိုင်း၏ အထောက်အထား
    အလုပ်ရှင်၊ အလုပ်အမျိုးအစား၊ အလုပ်ကာလနှင့် ဝင်ငွေကို ဖော်ပြသော အလုပ်လက်မှတ်နှင့် စာချုပ်
    မိမိလျှောက်ထားသူအုပ်စုအတွက် လိုအပ်သော ဝင်ငွေနှင့် အခွန်စာရွက်များ
    ဘွဲ့၊ အလုပ်အတွေ့အကြုံ၊ လိုင်စင်၊ စာရင်းဝင်ကုမ္ပဏီ သို့မဟုတ် သတ်မှတ်လုပ်ငန်း အထောက်အထား
    TOPIK၊ KIIP သို့မဟုတ် လက်ခံသော ကိုရီးယားဘာသာနှင့် လူမှုရေးပေါင်းစည်းမှု အထောက်အထား
    အပိုအမှတ်နှင့် လျှော့အမှတ်စာရွက်များ၊ လိုအပ်ပါက ရာဇဝတ်မှုနှင့် ကျန်းမာရေးစာရွက်များ
  steps: |-
    မိမိသည် မည်သည့် F-2-7 လျှောက်ထားသူအုပ်စုနှင့် ကိုက်ညီသည်ကို အရင်စစ်ပါ။ ဤအချက်မစစ်မီ အမှတ်မတွက်ပါနှင့်။
    HiKorea သို့မဟုတ် 1345 မှ လက်ရှိအမှတ်ဇယားနှင့် အုပ်စုစံနှုန်းကို အတည်ပြုပါ။
    အမှတ်ကို သတိထားတွက်ပြီး ပညာရေး၊ ဝင်ငွေ၊ ကိုရီးယားဘာသာ၊ အသက်၊ အလုပ်အတွေ့အကြုံနှင့် အပိုအမှတ်တိုင်းအတွက် တရားဝင်အထောက်အထား ပြင်ဆင်ပါ။
    ကိုရီးယားတွင် တရားဝင်နေထိုင်နေစဉ် လိုအပ်ပါက ချိန်းဆိုပြီး လူဝင်မှုရုံး သို့မဟုတ် HiKorea လုပ်ငန်းစဉ်မှ နေထိုင်ခွင့်ပြောင်းရန် လျှောက်ပါ။
    ခွင့်ပြုပြီးနောက် အလုပ်၊ ဝင်ငွေ၊ နေရပ်၊ နိုင်ငံကူးလက်မှတ်နှင့် မှတ်ပုံတင်အချက်အလက်ကို နောက်ဆုံးအခြေအနေအတိုင်း ထိန်းသိမ်းပါ။
  watchout: |-
    လျှောက်ထားသူအုပ်စုနှင့် အမှတ်စနစ်သည် သီးခြားအဆင့်နှစ်ခုဖြစ်သည်။ အမှတ်မြင့်သော်လည်း အုပ်စုမကိုက်လျှင် ခက်ခဲနိုင်သည်။
    ပညာရှင်ဝန်ထမ်းလမ်းကြောင်းတွင် D-2 နှင့် D-10 နေထိုင်ကာလကို လိုအပ်သော ပညာရှင်နေထိုင်ကာလထဲ ယေဘုယျအားဖြင့် မပေါင်းပါ။ လက်ရှိကင်းလွတ်ခွင့်ကို သီးခြားစစ်ပါ။
    အမှတ်ဇယား၊ နိုင်ငံဝင်ငွေနှင့် ချိတ်ဆက်သောစံနှုန်း၊ လုပ်ငန်းနယ်ပယ်နှင့် နေထိုင်ကာလ ပြောင်းနိုင်သည်။ လျှောက်သည့်နေ့၏ စည်းမျဉ်းကို အသုံးပြုပါ။
    အလုပ်ရှင်၊ အလုပ်အမျိုးအစား သို့မဟုတ် ဝင်ငွေပြောင်းလဲမှုသည် သက်တမ်းတိုးမှုကို ထိခိုက်နိုင်သည်။ စာချုပ်၊ ဝင်ငွေစာရွက်နှင့် လူဝင်မှုတင်ပြချက် ကိုက်ညီစေပါ။
    F-2-7 တွင် အလုပ်လုပ်ခွင့်ပိုကျယ်သော်လည်း တင်ပြရမည့်တာဝန်နှင့် ကန့်သတ်ချက်အားလုံး မပျောက်ပါ။ အလုပ်ပြောင်းခြင်း သို့မဟုတ် လုပ်ငန်းစတင်ခြင်းမပြုမီ အတည်ပြုပါ။
  notes: |-
    အမှတ်တွင် ယေဘုယျအားဖြင့် အသက်၊ ပညာရေး၊ ကိုရီးယားဘာသာ၊ ဝင်ငွေ၊ လူမှုရေးပေါင်းစည်းမှု၊ အပိုအမှတ်နှင့် လျှော့အမှတ် ပါဝင်သည်။ အဟောင်း online calculator တစ်ခုတည်းကို မယုံပါနှင့်။
    အဓိက F-2 ကိုင်ဆောင်သူက လက်ရှိဝင်ငွေစံနှုန်းပြည့်ပါက အိမ်ထောင်ဖက်နှင့် အရွယ်မရောက်သေးသော အိမ်ထောင်မရှိသားသမီးအတွက် F-2 ကို စဉ်းစားနိုင်ပြီး မပြည့်လျှင် အခြားမိသားစုနေထိုင်ခွင့် ဖြစ်နိုင်သည်။ F-2-7S တွင် သီးခြားမိသားစုအထူးစည်းမျဉ်းရှိသည်။
    အမှတ်စနစ် F-2 ကိုင်ဆောင်သူသည် သတ်မှတ်ကာလပြီးနောက် အမှတ်စနစ် အမြဲတမ်းနေထိုင်ခွင့်ကို စဉ်းစားနိုင်သော်လည်း အကျင့်စာရိတ္တ၊ အသက်မွေးဝမ်းကျောင်းနှင့် ပေါင်းစည်းမှု စံနှုန်းများ သီးခြားရှိသည်။
    ဤအချက်အလက်သည် အကျဉ်းချုပ်ဖြစ်သည်။ မလျှောက်မီ HiKorea၊ 1345 သို့မဟုတ် လူဝင်မှုရုံးတွင် မိမိအုပ်စု၊ လက်ရှိအမှတ်ဇယားနှင့် စာရွက်စာတမ်းစာရင်းကို အတည်ပြုပါ။
