title: F-6 Marriage Migrant Visa
category: visa
order: 7
lastReviewed: 2026-07-19
en:
  title: F-6 Marriage Migrant Visa — spouse, child caregiver, and marriage-ended routes
  summary: |-
    F-6 covers more than the foreign spouse of a Korean citizen. The detailed category depends on whether you are continuing a legally valid marriage, raising a child born from a relationship with a Korean citizen, or cannot continue the marriage for a reason not attributable to you. The evidence differs substantially by category.
  eligibility: |-
    F-6-1 Spouse of a Korean citizen: your marriage is legally valid in Korea and you intend to continue married life together in Korea. Marriage registration alone does not guarantee the visa; relationship, income, housing, communication, and other current screening standards may apply.
    F-6-2 Child caregiver: you are the father or mother raising a child born from a marital or de facto marital relationship with a Korean citizen, and the case meets the current recognition requirements.
    F-6-3 Marriage ended: you stayed in Korea while married to a Korean citizen but cannot maintain the normal marriage because of the Korean spouse's death, disappearance, or another reason not attributable to you, and the case is recognized by the Ministry of Justice.
    Each category requires different family, relationship, and factual evidence. Confirm your category before collecting documents.
  subtypes: |-
    F-6-1 Spouse of a Korean Citizen — A foreign spouse in a legally valid marriage who plans to continue married life with the Korean spouse in Korea
    F-6-2 Child Caregiver — A father or mother raising a child born from a marital or de facto marital relationship with a Korean citizen
    F-6-3 Marriage Ended — A person unable to continue the marriage because of the Korean spouse's death, disappearance, or another reason not attributable to the applicant
  documents: |-
    Common | Visa or integrated application form for the route, passport, photo, identity documents, and residence card if applying in Korea
    F-6-1 | Korean spouse's family-relation certificate, basic certificate, marriage-relation certificate, and resident-registration record, plus the applicant's marriage and civil-status documents from the home country
    F-6-1 | Invitation form, personal guarantee, applicant's marriage-background statement, relationship history, housing evidence, income evidence, and communication-language evidence under the current official requirements notice
    F-6-1 | Health examination and criminal-record documents when required by the current rule and the Korean embassy handling the application
    F-6-2 | Family-relation and birth records identifying the child and parents, plus documents showing actual custody and caregiving
    F-6-3 | Marriage and residence history plus evidence of death, disappearance, court or investigative records, medical records, or other material showing why the marriage ended and that the reason was not attributable to the applicant
    Foreign documents may require translation and Apostille or consular authentication. Country-specific requirements can add documents.
  steps: |-
    Identify the correct category first: F-6-1 spouse, F-6-2 child caregiver, or F-6-3 marriage ended.
    For F-6-1, complete the legally required marriage registration and download the newest required-document notice and forms from the Korean embassy responsible for your place of residence.
    The Korean family member and the applicant each prepare their own civil, relationship, income, housing, communication, and other required evidence.
    The applicant files through the route required by the embassy or immigration office. An interview or additional documents may be requested during review.
    After entering Korea on an F-6 visa, complete foreign-resident registration and the required stay procedure within the permitted period. If applying from inside Korea, first confirm that a change of status is available in your circumstances.
  watchout: |-
    Marriage registration and visa approval are separate. A legally registered marriage does not guarantee F-6-1 approval.
    Use the required-document notice of the Korean embassy with jurisdiction over your application. Document names, validity periods, designated hospitals, authentication, and interview procedures can differ by country and change.
    Do not submit altered documents or hide a previous marriage, health condition, criminal record, or material relationship fact. Inconsistencies can lead to additional review or refusal.
    F-6-2 and F-6-3 are evidence-heavy, fact-specific categories. A birth record, divorce, or separation alone may not prove all required elements.
    Share sensitive family and identity documents only with the embassy, immigration office, or another authorized institution that officially requires them.
  notes: |-
    F-6 holders are not restricted by status category in ordinary employment and profit-making activities, although other laws can still restrict specific work.
    A change of residence must be reported separately for the foreign spouse within the applicable deadline; the Korean spouse's moving-in report does not complete it automatically.
    An F-6 holder may later review permanent residence after the required stay period, but separate conduct, livelihood, and integration requirements apply.
    If a marriage ends and F-6-3 does not apply, another temporary status may be available for unavoidable family-affairs or property-division matters. Confirm the facts with 1345 or immigration.
    This is a summary. Use the current Korean embassy required-document notice and confirm your exact category with HiKorea, 1345, or the immigration office before applying.
ko:
  title: F-6 결혼이민 비자 — 한국인 배우자·자녀 양육자·혼인 단절자
  summary: |-
    F-6은 한국인의 외국인 배우자만을 뜻하지 않습니다. 한국인과 유효한 혼인을 계속하는 경우, 한국인과의 관계에서 출생한 자녀를 양육하는 경우, 또는 본인 책임이 없는 사유로 혼인을 계속할 수 없는 경우에 따라 세부 자격이 달라집니다. 유형별 입증자료도 크게 다릅니다.
  eligibility: |-
    F-6-1 국민의 배우자: 대한민국에서 혼인이 법적으로 유효하게 성립되어 있고 한국에서 배우자와 혼인생활을 계속하려는 사람. 혼인신고만으로 비자가 보장되지는 않으며, 관계의 진정성, 소득, 주거, 의사소통 등 최신 심사기준이 적용될 수 있습니다.
    F-6-2 자녀 양육자: 대한민국 국민과의 혼인관계 또는 사실상의 혼인관계에서 출생한 자녀를 실제로 양육하는 부 또는 모로서 현재 인정요건을 충족하는 사람.
    F-6-3 혼인 단절자: 한국인 배우자와 혼인한 상태로 국내에 체류하던 중 배우자의 사망·실종 또는 본인에게 책임이 없는 사유로 정상적인 혼인관계를 유지할 수 없고 법무부의 인정을 받는 사람.
    각 유형은 가족관계, 혼인관계와 사실관계를 입증하는 자료가 다릅니다. 서류를 모으기 전에 본인의 유형부터 확인하세요.
  subtypes: |-
    F-6-1 국민의 배우자 — 한국인 배우자와 법적으로 유효한 혼인을 맺고 국내에서 혼인생활을 계속하려는 외국인
    F-6-2 자녀 양육자 — 한국인과의 혼인관계 또는 사실상의 혼인관계에서 출생한 자녀를 양육하는 부 또는 모
    F-6-3 혼인 단절자 — 한국인 배우자의 사망·실종 또는 본인에게 책임이 없는 사유로 혼인생활을 계속할 수 없는 사람
  documents: |-
    공통 | 경로에 맞는 사증발급신청서 또는 통합신청서, 여권, 사진, 신분자료, 국내 신청 시 외국인등록증
    F-6-1 | 한국인 배우자의 가족관계증명서·기본증명서·혼인관계증명서·주민등록등본과 신청인 본국의 혼인·신분관계 서류
    F-6-1 | 외국인 배우자 초청장, 신원보증서, 결혼배경 진술서, 교제 경위, 주거, 소득, 의사소통 능력을 입증하는 최신 안내문상의 자료
    F-6-1 | 현재 규정과 신청을 담당하는 대한민국 재외공관에서 요구하는 경우 건강진단서와 범죄경력증명서
    F-6-2 | 자녀와 부모를 확인할 수 있는 가족·출생 관계 서류와 실제 양육 사실을 입증하는 자료
    F-6-3 | 혼인·체류 이력과 사망·실종, 판결·수사자료, 진료기록 등 혼인 단절 사유와 본인 책임이 없음을 보여주는 자료
    해외 발급 서류는 번역, 아포스티유 또는 영사확인이 필요할 수 있고 국가별 추가서류가 적용될 수 있습니다.
  steps: |-
    먼저 F-6-1 국민의 배우자, F-6-2 자녀 양육자, F-6-3 혼인 단절자 중 정확한 유형을 확인합니다.
    F-6-1은 필요한 혼인신고를 마친 뒤, 본인 거주지를 관할하는 대한민국 재외공관에서 최신 구비서류 안내와 서식을 받습니다.
    한국인 가족과 신청인이 각자 가족·신분·교제·소득·주거·의사소통 등 본인에게 요구되는 자료를 준비합니다.
    재외공관 또는 출입국에서 안내한 경로로 신청인이 접수합니다. 심사 중 인터뷰나 추가서류를 요청받을 수 있습니다.
    F-6 사증으로 입국한 뒤 허용된 기간 안에 외국인등록과 필요한 체류절차를 진행합니다. 국내 체류 중이라면 본인 상황에서 자격변경이 가능한지 먼저 확인하세요.
  watchout: |-
    혼인신고와 비자 허가는 별개의 절차입니다. 법적으로 혼인이 등록됐다고 F-6-1이 자동 허가되지는 않습니다.
    신청을 관할하는 대한민국 재외공관의 안내문을 사용하세요. 서류 명칭, 유효기간, 지정병원, 인증과 인터뷰 절차는 국가별로 다르고 바뀔 수 있습니다.
    변형된 서류를 제출하거나 과거 혼인, 건강상태, 범죄경력, 중요한 교제 사실을 숨기지 마세요. 내용이 일치하지 않으면 추가 심사 또는 불허로 이어질 수 있습니다.
    F-6-2와 F-6-3은 개별 사실과 증빙이 중요한 유형입니다. 출생기록, 이혼 또는 별거 사실 하나만으로 모든 요건이 입증되는 것은 아닙니다.
    민감한 가족·신분자료는 공식적으로 요구하는 재외공관, 출입국 또는 권한 있는 기관에만 제출하세요.
  notes: |-
    F-6 체류자는 일반적인 취업·영리활동에서 체류자격에 따른 제한을 받지 않지만, 개별 직업은 다른 법률로 제한될 수 있습니다.
    체류지가 바뀌면 외국인 배우자도 적용되는 기한 안에 별도로 체류지 변경신고를 해야 합니다. 한국인 배우자의 전입신고만으로 자동 완료되지 않습니다.
    F-6 체류자는 정해진 체류기간 이후 영주 자격을 검토할 수 있지만 품행, 생계유지, 기본소양 등 별도 요건이 적용됩니다.
    혼인이 끝났지만 F-6-3에 해당하지 않는 경우에도 가사정리·재산분할 등 불가피한 사유를 위한 다른 임시 체류자격이 가능한지 확인할 수 있습니다.
    본 정보는 요약입니다. 신청 전 관할 대한민국 재외공관의 최신 안내문을 사용하고 하이코리아, 1345 또는 관할 출입국·외국인관서에서 정확한 유형을 확인하세요.
my:
  title: F-6 အိမ်ထောင်ရေးနေထိုင်ခွင့် — ကိုရီးယားအိမ်ထောင်ဖက်၊ ကလေးစောင့်ရှောက်သူနှင့် အိမ်ထောင်ရေးရပ်စဲသူ
  summary: |-
    F-6 သည် ကိုရီးယားနိုင်ငံသား၏ နိုင်ငံခြားအိမ်ထောင်ဖက်သာ မဟုတ်ပါ။ တရားဝင်အိမ်ထောင်ရေး ဆက်လက်နေထိုင်ခြင်း၊ ကိုရီးယားနိုင်ငံသားနှင့် ရရှိသောကလေးကို စောင့်ရှောက်ခြင်း၊ သို့မဟုတ် မိမိအပြစ်မရှိသောအကြောင်းကြောင့် အိမ်ထောင်ရေးမဆက်နိုင်ခြင်းအလိုက် အမျိုးအစားကွာသည်။ အမျိုးအစားတိုင်း၏ အထောက်အထားလည်း မတူပါ။
  eligibility: |-
    F-6-1 ကိုရီးယားနိုင်ငံသား၏ အိမ်ထောင်ဖက်: အိမ်ထောင်ရေးသည် ကိုရီးယားတွင် တရားဝင်ဖြစ်ပြီး ကိုရီးယားတွင် အတူဆက်နေလိုသူ။ အိမ်ထောင်မှတ်ပုံတင်ခြင်းတစ်ခုတည်းဖြင့် ဗီဇာအာမခံမရပါ။ ဆက်ဆံရေး၊ ဝင်ငွေ၊ နေအိမ်နှင့် ဆက်သွယ်ဘာသာစကားစံနှုန်းများ သက်ရောက်နိုင်သည်။
    F-6-2 ကလေးစောင့်ရှောက်သူ: ကိုရီးယားနိုင်ငံသားနှင့် တရားဝင် သို့မဟုတ် အမှန်တကယ်အိမ်ထောင်ဆက်ဆံရေးမှ မွေးဖွားသောကလေးကို အမှန်တကယ်စောင့်ရှောက်နေသော မိဘ။
    F-6-3 အိမ်ထောင်ရေးရပ်စဲသူ: ကိုရီးယားအိမ်ထောင်ဖက်နှင့် အိမ်ထောင်ရေးဖြင့် ကိုရီးယားတွင် နေထိုင်စဉ် အိမ်ထောင်ဖက်သေဆုံးခြင်း၊ ပျောက်ဆုံးခြင်း သို့မဟုတ် မိမိအပြစ်မရှိသောအကြောင်းကြောင့် အိမ်ထောင်ရေးမဆက်နိုင်ဘဲ တရားရေးဝန်ကြီးဌာနက အသိအမှတ်ပြုသူ။
    အမျိုးအစားတိုင်းတွင် မိသားစု၊ အိမ်ထောင်ရေးနှင့် အဖြစ်မှန်အထောက်အထား မတူသောကြောင့် စာရွက်မစုမီ မိမိအမျိုးအစားကို စစ်ပါ။
  subtypes: |-
    F-6-1 ကိုရီးယားနိုင်ငံသား၏ အိမ်ထောင်ဖက် — တရားဝင်အိမ်ထောင်ရေးဖြင့် ကိုရီးယားတွင် အိမ်ထောင်ဖက်နှင့် ဆက်လက်နေလိုသော နိုင်ငံခြားသား
    F-6-2 ကလေးစောင့်ရှောက်သူ — ကိုရီးယားနိုင်ငံသားနှင့် ဆက်ဆံရေးမှ မွေးဖွားသောကလေးကို စောင့်ရှောက်သည့် မိဘ
    F-6-3 အိမ်ထောင်ရေးရပ်စဲသူ — အိမ်ထောင်ဖက်သေဆုံး၊ ပျောက်ဆုံး သို့မဟုတ် မိမိအပြစ်မရှိသောအကြောင်းကြောင့် အိမ်ထောင်ရေးမဆက်နိုင်သူ
  documents: |-
    အများသုံး | သက်ဆိုင်ရာဗီဇာ သို့မဟုတ် ပေါင်းစပ်လျှောက်လွှာ၊ နိုင်ငံကူးလက်မှတ်၊ ဓာတ်ပုံ၊ မှတ်ပုံတင်စာရွက်နှင့် ကိုရီးယားတွင်လျှောက်လျှင် နိုင်ငံခြားသားမှတ်ပုံတင်ကတ်
    F-6-1 | ကိုရီးယားအိမ်ထောင်ဖက်၏ မိသားစု၊ အခြေခံ၊ အိမ်ထောင်ရေးနှင့် နေထိုင်သူမှတ်တမ်း၊ လျှောက်ထားသူနိုင်ငံ၏ အိမ်ထောင်ရေးနှင့် အရပ်ဘက်စာရွက်များ
    F-6-1 | ဖိတ်ခေါ်စာ၊ အာမခံစာ၊ အိမ်ထောင်ရေးနောက်ခံဖော်ပြချက်၊ ဆက်ဆံရေးသမိုင်း၊ နေအိမ်၊ ဝင်ငွေနှင့် ဆက်သွယ်ဘာသာစကားအထောက်အထား
    F-6-1 | လတ်တလောစည်းမျဉ်းနှင့် တာဝန်ရှိ ကိုရီးယားသံရုံးက တောင်းလျှင် ကျန်းမာရေးစစ်ဆေးချက်နှင့် ရာဇဝတ်မှတ်တမ်း
    F-6-2 | ကလေးနှင့် မိဘကို သက်သေပြသော မိသားစု၊ မွေးစာရင်းနှင့် အမှန်တကယ်စောင့်ရှောက်မှုအထောက်အထား
    F-6-3 | အိမ်ထောင်ရေးနှင့် နေထိုင်သမိုင်း၊ သေဆုံး၊ ပျောက်ဆုံး၊ တရားရုံး၊ စုံစမ်းရေး၊ ဆေးမှတ်တမ်း သို့မဟုတ် မိမိအပြစ်မရှိသောအကြောင်းကို ပြသောစာရွက်များ
    နိုင်ငံခြားစာရွက်များကို ဘာသာပြန်ခြင်း၊ Apostille သို့မဟုတ် ကောင်စစ်အတည်ပြုခြင်း လိုနိုင်ပြီး နိုင်ငံအလိုက် အပိုစာရွက်များ ရှိနိုင်သည်။
  steps: |-
    F-6-1 အိမ်ထောင်ဖက်၊ F-6-2 ကလေးစောင့်ရှောက်သူ သို့မဟုတ် F-6-3 အိမ်ထောင်ရေးရပ်စဲသူကို အရင်ခွဲပါ။
    F-6-1 အတွက် လိုအပ်သော အိမ်ထောင်မှတ်ပုံတင်ပြီး မိမိနေထိုင်ရာဒေသကို တာဝန်ယူသော ကိုရီးယားသံရုံးမှ နောက်ဆုံးစာရင်းနှင့် ပုံစံများ ရယူပါ။
    ကိုရီးယားမိသားစုဝင်နှင့် လျှောက်ထားသူသည် မိသားစု၊ မှတ်ပုံတင်၊ ဆက်ဆံရေး၊ ဝင်ငွေ၊ နေအိမ်နှင့် ဘာသာစကားအထောက်အထားကို သီးခြားပြင်ဆင်ပါ။
    သံရုံး သို့မဟုတ် လူဝင်မှုရုံးက သတ်မှတ်သောလမ်းကြောင်းဖြင့် လျှောက်ထားသူက တင်ပါ။ အင်တာဗျူး သို့မဟုတ် အပိုစာရွက် တောင်းနိုင်သည်။
    F-6 ဖြင့် ကိုရီးယားဝင်ပြီးနောက် ခွင့်ပြုကာလအတွင်း နိုင်ငံခြားသားမှတ်ပုံတင်နှင့် နေထိုင်မှုလုပ်ငန်းစဉ် ပြီးစီးပါ။ ကိုရီးယားအတွင်းလျှောက်လျှင် မိမိအတွက် အမျိုးအစားပြောင်းခွင့် ရှိမရှိ အရင်စစ်ပါ။
  watchout: |-
    အိမ်ထောင်မှတ်ပုံတင်ခြင်းနှင့် ဗီဇာခွင့်ပြုခြင်းသည် သီးခြားဖြစ်သည်။ တရားဝင်အိမ်ထောင်ရေးရှိရုံဖြင့် F-6-1 အလိုအလျောက် မရပါ။
    မိမိလျှောက်လွှာကို တာဝန်ယူသော ကိုရီးယားသံရုံး၏ စာရင်းကို အသုံးပြုပါ။ စာရွက်အမည်၊ သက်တမ်း၊ သတ်မှတ်ဆေးရုံ၊ အတည်ပြုမှုနှင့် အင်တာဗျူးသည် နိုင်ငံအလိုက်ကွာပြီး ပြောင်းနိုင်သည်။
    ပြင်ဆင်ထားသော မမှန်စာရွက် မတင်ပါနှင့်။ ယခင်အိမ်ထောင်ရေး၊ ကျန်းမာရေး၊ ရာဇဝတ်မှတ်တမ်း သို့မဟုတ် အရေးကြီးဆက်ဆံရေးအချက်ကို မဖုံးကွယ်ပါနှင့်။
    F-6-2 နှင့် F-6-3 တွင် အဖြစ်မှန်နှင့် အထောက်အထား အလွန်အရေးကြီးသည်။ မွေးစာရင်း၊ ကွာရှင်းခြင်း သို့မဟုတ် ခွဲနေခြင်းတစ်ခုတည်းဖြင့် စံနှုန်းအားလုံး မပြည့်နိုင်ပါ။
    အရေးကြီးမိသားစုနှင့် မှတ်ပုံတင်စာရွက်များကို တရားဝင်တောင်းသော သံရုံး၊ လူဝင်မှုရုံး သို့မဟုတ် ခွင့်ပြုထားသောအဖွဲ့ထံသာ ပေးပါ။
  notes: |-
    F-6 ကိုင်ဆောင်သူသည် ပုံမှန်အလုပ်နှင့် ဝင်ငွေလုပ်ငန်းများတွင် နေထိုင်ခွင့်အမျိုးအစားကန့်သတ်မှု မရှိသော်လည်း အချို့အလုပ်ကို အခြားဥပဒေက ကန့်သတ်နိုင်သည်။
    နေရပ်ပြောင်းလျှင် နိုင်ငံခြားအိမ်ထောင်ဖက်ကလည်း သတ်မှတ်ကာလအတွင်း သီးခြားတင်ပြရမည်။ ကိုရီးယားအိမ်ထောင်ဖက်၏ နေရပ်ပြောင်းတင်ပြမှုဖြင့် အလိုအလျောက် မပြီးပါ။
    F-6 ကိုင်ဆောင်သူသည် သတ်မှတ်နေထိုင်ကာလပြီးနောက် အမြဲတမ်းနေထိုင်ခွင့်ကို စဉ်းစားနိုင်သော်လည်း အကျင့်စာရိတ္တ၊ အသက်မွေးဝမ်းကျောင်းနှင့် ပေါင်းစည်းမှုစံနှုန်း သီးခြားရှိသည်။
    အိမ်ထောင်ရေးပြီးဆုံးသော်လည်း F-6-3 မကိုက်လျှင် မိသားစုကိစ္စ သို့မဟုတ် ပစ္စည်းခွဲဝေမှုအတွက် အခြားယာယီနေထိုင်ခွင့် ရှိမရှိ 1345 သို့မဟုတ် လူဝင်မှုရုံးတွင် စစ်နိုင်သည်။
    ဤအချက်အလက်သည် အကျဉ်းချုပ်ဖြစ်သည်။ မလျှောက်မီ တာဝန်ရှိ ကိုရီးယားသံရုံး၏ လတ်တလောစာရင်းကို အသုံးပြုပြီး HiKorea၊ 1345 သို့မဟုတ် လူဝင်မှုရုံးတွင် အမျိုးအစားကို အတည်ပြုပါ။
