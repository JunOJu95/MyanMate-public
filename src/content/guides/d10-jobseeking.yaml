title: D-10 Job-Seeking Visa
category: visa
order: 3
lastReviewed: 2026-05-21
en:
  title: D-10 Job-Seeking Visa — look for professional work in Korea
  summary: >-
    D-10 lets you stay in Korea to look for professional or skilled work, or to
    prepare a tech startup. The most common path: graduate from a Korean university
    on D-2, then switch to D-10. Who qualifies, the documents, and the point system.
  eligibility: |-
    General job-seeking (D-10-1): for people aiming at professional jobs (E-1 to E-7) who hold a bachelor's (or Korean associate) degree, scored on a points table — at least 60 of 190 points, with at least 20 base points.
    Point-test exemption/special routes: if you graduated from a Korean university (associate or above) on D-2, your first D-10 change within 1 year may skip the points test. Other Korean-ability and promising-talent routes have separate conditions, so confirm your path.
    Other sub-types: D-10-2 tech-startup preparation, D-10-3 advanced-tech intern, D-10-T top-tier talent.
  subtypes: |-
    D-10-1 General Job-Seeking — Job-seeking in E-1 to E-7 fields + short-term internships (60+ points or exemption)
    D-10-2 Tech Startup Preparation — Tech startup activities — patents, OASIS, K-Startup, OECD IP rights
    D-10-3 Advanced-Tech Internship — Bachelor's+ in advanced tech from a top global university (THE 200 / QS 500), internship-based (Certificate of Visa Issuance only)
    D-10-T Top-Tier Talent — Job-seeking/training for master's+ graduates from a global top-100 university within the last 5 years
  documents: |-
    Common: application form, photo, passport copy, fee, ID copy
    A job-search plan (구직활동 계획서)
    Degree or graduation certificate
    Proof of living costs — a bank balance of at least the single-household housing-benefit standard × months of stay (waived for some point-exempt cases)
    As applicable: Korean-ability proof (TOPIK or the KIIP social-integration program), work-experience certificates, university-ranking evidence, a recommendation
    Documents issued abroad must be translated into Korean or English and Apostille-certified (or notarized by your government)
  steps: |-
    Confirm your route: the points-based track, or the point-exempt track (recent Korean-university graduate).
    Gather the documents for your route (job-search plan + degree + finances).
    Applying from abroad: apply at the Korean embassy or consulate (a single-entry, 6-month D-10). Already in Korea as a Korean-university graduate: apply for a change of status at immigration (HiKorea).
    Once on D-10, look for work; when you're hired, change to the matching work visa (for example E-7).
  watchout: |-
    The post-graduation point exemption applies only to your FIRST D-10 change and within 1 year of graduating — don't miss the window.
    A criminal record or past immigration violations can disqualify you (for example fines, or a deportation/exit order within set periods).
    D-10 is for job-seeking, not working — you may start work only after changing to the right work visa. Confirm details on HiKorea.
  notes: |-
    Stay per issuance: 1 year (60-80 points, caregiver trainees, professional career-changers, some D-10-2 tracks: 6 months)
    Total stay cap: 3 years (80+ points, top Korean speakers, promising talent, foreign youth, D-10-3, D-10-T) or 1 year (60-80 points, professional career-changers)
    First-time D-10-1 status change after Korean university (associate degree or higher) D-2 graduation is points-exempt + grants 1 year. Extensions DO require points
    D-10-1 part-time work (D-10-2 and D-10-3 not eligible): Korean university associate+ + within 3 years of graduation + KIIP Stage 4 or TOPIK Level 4+ + no prior E-1 to E-7 stay. Manufacturing (KIIP Stage 4 only) or agriculture, 25 hrs/week (KIIP Stage 5+ gets 30), unlimited weekends
    Designated-country nationals (incl. Myanmar) changing from B/C series, D-3, E-9, E-10, or G-1 to D-10 need 80+ points (not 60)
    D-10-3 advanced-tech internship: Certificate of Visa Issuance only. Each grant is up to 1 year; total stay may reach 3 years if conditions are maintained
    D-10-T (top-tier talent) applies STRICTER disqualifications beyond the standard D-10 list
    Re-entry within 1 year is exempt; 1-2 years requires multi-entry permit. D-10 is NOT in the Saudi/Iran/Libya multi-entry exception list
    Report changes to name, sex, birth date, nationality, passport, or affiliated organization within 15 days (also for internship start or organization change)
    This is a summary. For the full points-system table and stay caps, contact the 1345 Foreign Resident Hotline or your local Immigration Office
ko:
  title: D-10 구직 비자 — 한국에서 전문 일자리 찾기
  summary: >-
    D-10은 한국에서 전문·숙련 일자리를 구하거나 기술창업을 준비하기 위해 체류하는 비자입니다.
    가장 흔한 경로: 한국 대학을 D-2로 졸업한 뒤 D-10으로 변경. 자격, 서류, 점수제를 정리했어요.
  eligibility: |-
    일반구직(D-10-1): 전문직종(E-1~E-7) 취업을 목표로 하는, 학사(국내 전문학사 포함) 이상 학위 소지자. 구직 점수표(총 190점 중 기본 20점 이상, 총 60점 이상)로 평가합니다.
    국내 대학을 D-2로 졸업한 경우, 졸업 후 1년 이내 최초 D-10 변경은 점수제가 면제될 수 있습니다. 그 외 한국어 우수자·유망인재 특례는 조건이 따로 있으니 본인 경로를 확인해야 합니다.
    세부약호: D-10-2 기술창업준비, D-10-3 첨단기술인턴, D-10-T 최우수인재.
  subtypes: |-
    D-10-1 일반구직 — E-1~E-7 분야 구직 + 단기 인턴 (점수제 60점 이상 또는 면제 특례)
    D-10-2 기술창업준비 — 특허·OASIS·K-Startup·OECD 지식재산권 등 기술창업 준비 활동
    D-10-3 첨단기술인턴 — 해외 우수대학(THE 200·QS 500) 첨단기술 분야 학사+ 인턴 (사증발급인정서로만)
    D-10-T 최우수인재 — 최근 5년 이내 세계 100위 이내 대학에서 석사 이상 학위를 취득한 사람의 구직·연수 비자입니다.
  documents: |-
    공통: 신청서, 사진, 여권 사본, 수수료, 신분증 사본
    구직활동 계획서
    학위증 또는 졸업증명서
    체재비 입증서류 — 1인 가구 주거급여 기준액 × 체류개월 수 이상의 잔고(일부 점수제 면제자는 제출 면제)
    해당 시: 한국어능력 입증(TOPIK 또는 사회통합프로그램), 근무경력 증빙, 대학순위 소명자료, 추천서
    해외 발급 서류는 한글·영어로 번역 후 아포스티유 인증 또는 자국정부 공증
  steps: |-
    경로를 확인합니다: 점수제 또는 점수제 면제(국내 대학 졸업자).
    경로에 맞는 서류를 준비합니다(구직활동 계획서 + 학위 + 재정).
    해외에서 신청: 대한민국 대사관·영사관에서 신청(체류 6개월 단수 D-10). 국내 대학 졸업 후 한국에 있는 경우: 출입국(하이코리아)에서 체류자격 변경 신청.
    D-10으로 구직 활동을 하고, 취업이 확정되면 해당 취업 비자(예: E-7)로 변경합니다.
  watchout: |-
    졸업 후 점수제 면제는 '최초' D-10 변경, 그리고 졸업일로부터 1년 이내에만 적용됩니다 — 시기를 놓치지 마세요.
    범죄경력이나 과거 출입국법 위반(벌금, 일정 기간 내 강제퇴거·출국명령 등)은 결격 사유가 될 수 있습니다.
    D-10은 '취업'이 아니라 '구직'을 위한 비자입니다 — 알맞은 취업 비자로 변경한 뒤에야 일할 수 있어요. 자세한 내용은 하이코리아에서 확인하세요.
  notes: |-
    1회 부여 체류기간: 1년 (점수제 60-80점·요양보호사·전문직종 경력자·D-10-2 일부는 6개월)
    전체 체류기간 상한: 최대 3년 (점수 80점 이상·한국어 우수자·유망인재·외국인 청소년·D-10-3·D-10-T) 또는 1년 (60-80점·전문직종 경력자)
    국내 대학(전문학사 이상) D-2 졸업 후 최초 D-10-1 변경은 점수제 면제 + 1년 부여, 연장 시에는 점수제 적용
    D-10-1 시간제 취업 (D-10-2·D-10-3 제외): 국내 대학 전문학사 이상 + 학위 취득 3년 미만 + KIIP 4단계 또는 TOPIK 4급 + E계열 미경험. 제조업(KIIP 4단계+) 또는 농업, 주중 25시간(KIIP 5단계+ 30시간), 주말 무제한
    법무부 고시국가 국민(미얀마 포함) — B·C 계열·D-3·E-9·E-10·G-1에서 D-10 변경 시 80점 이상 필요
    D-10-3 첨단기술인턴은 사증발급인정서로만 신청합니다. 1회 최대 1년, 요건 유지 시 총 최대 3년까지 가능할 수 있습니다.
    D-10-T(최우수인재)는 일반 D-10보다 더 엄격한 별도 결격사유 적용
    1년 이내 재입국은 허가 면제, 1~2년은 복수재입국허가 필요. D-10은 사우디·이란·리비아 복수재입국 예외에 포함되지 않음
    성명·성별·생년월일·국적·여권·소속기관 변경 시 15일 이내 신고 (인턴 개시·소속기관 변경 동일)
    본 정보는 요약이며, 점수제 세부 배점·체류기간 상한 표는 1345 외국인종합안내센터 또는 관할 출입국·외국인관서에 확인하세요
my:
  title: D-10 အလုပ်ရှာဖွေ ဗီဇာ — ကိုရီးယားတွင် ကျွမ်းကျင်အလုပ် ရှာရန်
  summary: >-
    D-10 သည် ကိုရီးယားတွင် ကျွမ်းကျင်/ပညာရှင်အလုပ် ရှာရန် သို့မဟုတ် နည်းပညာစီးပွားရေး စတင်ရန်
    နေထိုင်ခွင့်ဖြစ်သည်။ အသုံးအများဆုံးလမ်း — ကိုရီးယားတက္ကသိုလ်ကို D-2 ဖြင့်ဘွဲ့ရပြီး D-10 သို့ ပြောင်းခြင်း။
  eligibility: |-
    အထွေထွေအလုပ်ရှာ (D-10-1): ပညာရှင်အလုပ် (E-1 မှ E-7) ကို ရည်မှန်းသူ၊ ဘွဲ့ (ကိုရီးယား Associate အပါအဝင်) ရှိသူ။ အမှတ်ပေးဇယား (၁၉၀ တွင် အခြေခံ ၂၀ အထက်၊ စုစုပေါင်း ၆၀ အထက်) ဖြင့် တွက်သည်။
    အမှတ်စနစ် ကင်းလွတ်/အထူးလမ်းကြောင်း: ကိုရီးယားတက္ကသိုလ် (Associate အထက်) ကို D-2 ဖြင့် ဘွဲ့ရပါက၊ ဘွဲ့ရပြီး ၁ နှစ်အတွင်း ပထမဆုံး D-10 ပြောင်းရာတွင် အမှတ်စနစ် ကင်းလွတ်နိုင်သည်။ ကိုရီးယားဘာသာ ထူးချွန်သူနှင့် အလားအလာရှိသူ လမ်းကြောင်းများတွင် သီးခြား အခြေအနေများ ရှိသည်။
    အမျိုးအစား — D-10-2 နည်းပညာစီးပွားရေး ပြင်ဆင်မှု၊ D-10-3 အဆင့်မြင့်နည်းပညာ အလုပ်သင်၊ D-10-T ထိပ်တန်းကျွမ်းကျင်သူ။
  subtypes: |-
    D-10-1 သာမန် အလုပ်ရှာ — E-1 မှ E-7 နယ်ပယ် အလုပ်ရှာ + ရေတို အလုပ်သင် (၆၀ မှတ် အထက် သို့မဟုတ် ကင်းလွတ်ခွင့်)
    D-10-2 ကုမ္ပဏီ စတင်ထူထောင်ရေး ပြင်ဆင် — မူပိုင်ခွင့်·OASIS·K-Startup·OECD ပိုင်ဆိုင်ပညာရပ် စသည့် ကုမ္ပဏီ စတင်ထူထောင်ရေး လုပ်ဆောင်ချက်
    D-10-3 နည်းပညာ မြင့်မား အလုပ်သင် — နိုင်ငံတကာ ထိပ်တန်း တက္ကသိုလ် (THE ၂၀၀ / QS ၅၀၀) နည်းပညာ မြင့်မား ဘွဲ့ အထက် (Certificate of Visa Issuance ဖြင့်သာ)
    D-10-T ထူးချွန်ပညာရှင် — နောက်ဆုံး ၅ နှစ်အတွင်း ကမ္ဘာ့အဆင့် ၁၀၀ အတွင်း တက္ကသိုလ်မှ မဟာဘွဲ့အထက် ရသူများ၏ အလုပ်ရှာ/လေ့ကျင့်ရေး ဗီဇာ
  documents: |-
    အများသုံး — လျှောက်လွှာ၊ ဓာတ်ပုံ၊ နိုင်ငံကူးလက်မှတ် မိတ္တူ၊ အခကြေးငွေ၊ မှတ်ပုံတင် မိတ္တူ
    အလုပ်ရှာဖွေမှု အစီအစဉ် (구직활동 계획서)
    ဘွဲ့လက်မှတ် သို့မဟုတ် ဘွဲ့ရ ထောက်ခံစာ
    နေထိုင်စရိတ် အထောက်အထား — တစ်ဦးအိမ်ထောင်စု နေအိမ်ထောက်ပံ့ စံနှုန်း × နေထိုင်လ အရေအတွက် အထက် ဘဏ်လက်ကျန် (အချို့ ကင်းလွတ်သူများ မလို)
    သက်ဆိုင်ပါက — ကိုရီးယားဘာသာ အထောက်အထား (TOPIK သို့မဟုတ် KIIP)၊ အလုပ်အတွေ့အကြုံ လက်မှတ်၊ တက္ကသိုလ်အဆင့် အထောက်အထား၊ ထောက်ခံစာ
    နိုင်ငံခြားထုတ် စာရွက်များကို ကိုရီးယား/အင်္ဂလိပ် ဘာသာပြန်ပြီး Apostille သို့မဟုတ် အစိုးရ နိုတီ လုပ်ရမည်
  steps: |-
    သင့်လမ်းကြောင်း စစ်ပါ — အမှတ်ပေးစနစ် သို့မဟုတ် အမှတ်ကင်းလွတ် (ကိုရီးယားတက္ကသိုလ် ဘွဲ့ရသူ)။
    လမ်းကြောင်းနှင့်ကိုက်ညီသော စာရွက်များ ပြင်ဆင်ပါ (အလုပ်ရှာ အစီအစဉ် + ဘွဲ့ + ငွေကြေး)။
    နိုင်ငံခြားမှ လျှောက်လျှင်: ကိုရီးယားသံရုံး/ကောင်စစ်ဝန်ရုံးတွင် လျှောက်ပါ (၆ လ single-entry D-10)။ ကိုရီးယားတွင်ရှိနေသော တက္ကသိုလ်ဘွဲ့ရဆိုလျှင်: လူဝင်မှု (HiKorea) တွင် နေထိုင်ခွင့် ပြောင်းရန် လျှောက်ပါ။
    D-10 ဖြင့် အလုပ်ရှာပြီး၊ အလုပ်ရသည့်အခါ သက်ဆိုင်ရာ အလုပ်ဗီဇာ (ဥပမာ E-7) သို့ ပြောင်းပါ။
  watchout: |-
    ဘွဲ့ရပြီး အမှတ်ကင်းလွတ်ခွင့်သည် 'ပထမဆုံး' D-10 ပြောင်းခြင်း၊ ဘွဲ့ရပြီး ၁ နှစ်အတွင်းသာ သက်ဆိုင် — အချိန် မလွတ်ပါစေနှင့်။
    ရာဇဝတ်မှတ်တမ်း သို့မဟုတ် လူဝင်မှုဥပဒေ ချိုးဖောက်မှု (ဒဏ်ငွေ၊ သတ်မှတ်ကာလအတွင်း နှင်ထုတ်/ထွက်ခွာအမိန့်) သည် အရည်အချင်း ပျက်စေနိုင်သည်။
    D-10 သည် 'အလုပ်လုပ်ရန်' မဟုတ်ဘဲ 'အလုပ်ရှာရန်' ဗီဇာ — သင့်တော်သော အလုပ်ဗီဇာ ပြောင်းပြီးမှသာ အလုပ်လုပ်နိုင်သည်။ HiKorea တွင် အတည်ပြုပါ။
  notes: |-
    တစ်ကြိမ်ပေးအပ်သော နေထိုင်ခွင့်: ၁ နှစ် (၆၀-၈၀ မှတ်၊ ပြုစုစောင့်ရှောက်သူ၊ အသက်မွေးဝမ်းကျောင်း အတွေ့အကြုံ ရှိသူ၊ D-10-2 အချို့ — ၆ လ)
    စုစုပေါင်း နေထိုင်ခွင့် အများဆုံး: ၃ နှစ် (၈၀ မှတ် အထက်၊ ကိုရီးယားဘာသာ ထူးချွန်သူ၊ အလားအလာ ရှိသူ၊ သာလွန် ငယ်ရွယ်သူ၊ D-10-3၊ D-10-T) သို့မဟုတ် ၁ နှစ် (၆၀-၈၀ မှတ်၊ အသက်မွေးဝမ်းကျောင်း အတွေ့အကြုံ ရှိသူ)
    ကိုရီးယား တက္ကသိုလ် (Junior College အထက်) D-2 ဘွဲ့ရ ပြီးနောက် ပထမအကြိမ် D-10-1 ပြောင်းခြင်း — မှတ်စနစ် ကင်းလွတ် + ၁ နှစ် ပေးအပ်၊ တိုးမြှင့်ရာတွင် မှတ်စနစ် အသုံးပြု
    D-10-1 အချိန်ပိုင်း အလုပ် (D-10-2 နှင့် D-10-3 မပါ): ကိုရီးယား Junior College အထက် + ဘွဲ့ရ ၃ နှစ်အတွင်း + KIIP အဆင့် ၄ သို့မဟုတ် TOPIK ၄ + E-1 မှ E-7 မရှိ။ စက်မှု (KIIP ၄ သာ) သို့မဟုတ် စိုက်ပျိုးရေး၊ တစ်ပတ် ၂၅ နာရီ (KIIP ၅+ ၃၀ နာရီ)၊ စနေ-တနင်္ဂနွေ ကန့်သတ် မရှိ
    တရားရေး ဝန်ကြီး အမိန့် နိုင်ငံ (မြန်မာ အပါ) — B/C/D-3/E-9/E-10/G-1 မှ D-10 သို့ ပြောင်းပါက ၈၀ မှတ် အထက် လို
    D-10-3 — Certificate of Visa Issuance ဖြင့်သာ လျှောက်ရသည်။ တစ်ကြိမ် အများဆုံး ၁ နှစ်ဖြစ်ပြီး၊ အခြေအနေများ ထိန်းသိမ်းပါက စုစုပေါင်း ၃ နှစ်အထိ ဖြစ်နိုင်သည်
    D-10-T (ထူးချွန်ပညာရှင်) သည် သာမန် D-10 ထက် ပိုပြီး တင်းကြပ်သော သီးခြား မဖြစ်ထိုက်သော အကြောင်းများ ကျင့်သုံး
    ၁ နှစ်အတွင်း ပြန်ဝင်ခြင်း ကင်းလွတ်၊ ၁-၂ နှစ် အကြိမ်များ ပြန်ဝင်ခွင့် လို။ D-10 သည် ဆော်ဒီ·အီရန်·လစ်ဗျား ခြွင်းချက် စာရင်းတွင် မပါ
    အမည်·လိင်·မွေးနေ့·နိုင်ငံသား·ပတ်စပို့·သက်ဆိုင်ရာ အဖွဲ့အစည်း ပြောင်းပါက ၁၅ ရက်အတွင်း သတင်းပို့ရန် (အလုပ်သင် စတင်ခြင်း သို့မဟုတ် အဖွဲ့အစည်း ပြောင်းခြင်း တူညီ)
    ဤ အချက်အလက်များသည် အကျဉ်းချုပ်သာ ဖြစ်သည်။ မှတ်စနစ် အသေးစိတ်·နေထိုင်ခွင့် ဇယား — 1345 နိုင်ငံခြားသား စင်တာ သို့မဟုတ် Immigration Office သို့ ဆက်သွယ် စုံစမ်းပါ
