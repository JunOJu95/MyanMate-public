title: E-9 Employment Permit (EPS)
category: visa
order: 4
lastReviewed: 2026-06-03
en:
  title: E-9 Employment Permit (EPS) — non-professional work in Korea
  summary: >-
    E-9 is the visa for non-professional work under Korea's Employment Permit
    System (고용허가제, EPS) — manufacturing, construction, farming, fishing, and
    some services. Korea runs EPS with Myanmar. You start with the EPS-TOPIK exam
    at home; a Korean employer selects you and files for your visa. Who qualifies,
    the documents, the steps, and how to stay clear of illegal middlemen.
  eligibility: |-
    Myanmar is one of Korea's Employment Permit System (EPS) sending countries. E-9 goes through EPS-TOPIK, the sending-agency process, and the Korean employer's employment-permit steps.
    E-9 workplace eligibility differs by sector. Manufacturing mainly follows the small/medium business standard, while construction, farming, fishing, and services have separate requirements.
    Allowed sectors and sub-codes: E-9-1 manufacturing, E-9-2 construction, E-9-3 agriculture & livestock, E-9-4 fishing, E-9-9 forestry, E-9-10 mining, E-9-5 some services (cold storage, hotels/lodging in designated regions, Korean-restaurant kitchen help in pilot areas, recycling/waste, courier loading). Forestry, mining, hotel/lodging and Korean-restaurant work were added in 2024.
    Maximum stay is up to 4 years 10 months in total (a first period of 3 years plus one extension of 1 year 10 months).
    Jobs that need professional qualifications are excluded — those use other visas.
  documents: |-
    Important: your E-9 visa is issued through a Certificate of Confirmation of Visa Issuance (사증발급인정서) that your KOREAN EMPLOYER files — not you. Your own steps run through EPS and your home-country sending agency.
    From you (in Myanmar): EPS-TOPIK pass, registration on the EPS jobseeker roster, a health check, and — once selected — the signed standard labor contract (표준근로계약서)
    From you: a criminal-record certificate (issued within the last 3 months) and a self-written health-status statement (declaring TB, hepatitis B, syphilis, etc.) — required since 2012
    Your employer files: visa-issuance-confirmation application (별지 제21호 서식), your passport copy and photo, business registration, the employment permit (고용허가서) + standard labor contract copy, and a workplace survey — plus sector-specific papers
    After the 사증발급인정서 is issued, you apply for the E-9 visa at the Korean embassy in Myanmar
  steps: |-
    Pass EPS-TOPIK and register on the EPS jobseeker roster (구직자명부) through the official channel — Korea's EPS (eps.go.kr) and Myanmar's authorized sending agency.
    A Korean employer who could not fill the job locally selects you from the roster and signs a standard labor contract.
    The employer obtains an employment permit (고용허가서) and files your 사증발급인정서 at Korean immigration (or through the sector's official support body — e.g. the SME federation, construction, fisheries or agriculture associations).
    Once the 사증발급인정서 is issued, apply for the E-9 visa at the Korean embassy; you travel as a scheduled group, do entry job-training and a health check, then go to your workplace.
    After entry, complete foreign-resident registration. Your stay can run up to 4 years 10 months (3 years + extension).
  watchout: |-
    EPS is run by governments — go through the official EPS (eps.go.kr) and Myanmar's authorized sending agency. Be very careful of unofficial middlemen who demand large fees or promise to "arrange" a job or visa for you; illegal middlemen are the most common way E-9 workers get cheated. Official EPS costs are limited and published.
    Changing workplace (사업장 변경) is limited in number and reason, and the rules change often. If you leave a job you must find a new one within the allowed job-search period, or you risk falling out of status — confirm current rules with the job center (고용센터) and HiKorea.
    Faithful-worker re-entry: if you finish your term without changing workplace (or stay in the same sector for 4 years 10 months) and your employer rehires you, you may re-enter to work just 1 month after leaving, with the Korean test and job-training waived. Conditions are strict — confirm with the job center.
    A criminal record or health issues can affect eligibility. E-9 work is tied to your permitted employer and sector — work only as permitted, and confirm the latest details on HiKorea and eps.go.kr.
ko:
  title: E-9 고용허가제(EPS) — 한국에서 비전문 취업
  summary: >-
    E-9은 고용허가제(EPS)로 비전문 분야에 취업하는 비자입니다 — 제조·건설·농축산·어업과
    일부 서비스업. 한국은 미얀마와 EPS 협정을 운영해요. 본국에서 EPS-TOPIK에 합격하면,
    한국 사업주가 선택해 비자를 신청합니다. 자격, 서류, 절차, 그리고 불법 브로커를 피하는
    법까지 정리했어요.
  eligibility: |-
    미얀마는 한국 고용허가제(EPS) 송출 대상 국가입니다. E-9은 EPS-TOPIK, 송출기관, 한국 사업주의 고용허가 절차를 거쳐 진행됩니다.
    E-9은 업종별로 허용 사업장 기준이 다릅니다. 제조업은 중소기업 기준이 핵심이고, 건설·농축산·어업·서비스업은 별도 요건이 적용됩니다.
    허용 업종·약호: E-9-1 제조업, E-9-2 건설업, E-9-3 농축산업, E-9-4 어업, E-9-9 임업, E-9-10 광업, E-9-5 일부 서비스업(냉장·냉동창고업, 지정 지역의 호텔·숙박업, 시범지역 한식 음식점업 주방보조, 재생용 재료수집, 택배 하역 등). 임업·광업·호텔숙박·한식음식점업은 2024년에 추가됐어요.
    체류는 최장 4년 10개월(최초 3년 + 1회 1년 10개월 연장).
    전문 자격이 필요한 직종은 제외됩니다 — 그건 다른 비자예요.
  documents: |-
    중요: E-9 비자는 한국 '사업주'가 신청하는 사증발급인정서로 발급됩니다 — 본인이 아니라요. 근로자 본인 절차는 EPS와 본국 송출기관을 통해 진행됩니다.
    본인(미얀마): EPS-TOPIK 합격, EPS 구직자명부 등록, 건강검진, 그리고 선발되면 표준근로계약서 서명
    본인: 범죄경력증명서(3개월 이내 발급)와 자필 건강상태확인서(결핵·B형간염·매독 등 기재) — 2012년부터 필수
    사업주가 신청: 사증발급인정신청서(별지 제21호 서식), 여권 사본·사진, 사업자등록증, 고용허가서+표준근로계약서 사본, 사업장실태조사서 — 그리고 업종별 추가서류
    사증발급인정서가 나오면 본국 대한민국 대사관에서 E-9 사증을 신청합니다
  steps: |-
    공식 경로로 EPS-TOPIK에 합격하고 EPS 구직자명부에 등록합니다 — 한국 EPS(eps.go.kr)와 미얀마의 지정 송출기관을 통해서요.
    내국인을 구하지 못한 한국 사업주가 명부에서 본인을 선택해 표준근로계약을 맺습니다.
    사업주가 고용허가서를 받아 출입국에 사증발급인정서를 신청합니다(또는 업종별 공식 지원기관 — 중소기업중앙회·대한건설협회·수협·농협 등을 통해).
    사증발급인정서가 나오면 대사관에서 E-9 사증을 신청하고, 지정된 날짜에 단체로 입국해 취업교육·건강검진을 받은 뒤 사업장에 배치됩니다.
    입국 후 외국인등록을 합니다. 체류는 최장 4년 10개월(3년 + 연장).
  watchout: |-
    EPS는 정부가 운영합니다 — 반드시 공식 EPS(eps.go.kr)와 미얀마 지정 송출기관을 통하세요. 일자리·비자를 '대신 구해 준다'며 큰돈을 요구하는 불법 브로커를 특히 조심하세요. E-9 노동자가 사기를 당하는 가장 흔한 경로가 불법 브로커입니다. 공식 EPS 비용은 정해져 있고 공개돼 있어요.
    사업장 변경은 횟수·사유가 제한되고 규정이 자주 바뀝니다. 일을 그만두면 정해진 구직기간 안에 새 사업장을 찾아야 하며, 그러지 못하면 체류 자격을 잃을 수 있어요 — 정확한 규정은 고용센터와 하이코리아에서 확인하세요.
    성실근로자 재입국 특례: 사업장을 바꾸지 않고(또는 같은 업종에서 4년 10개월) 근무를 마치고 사업주가 재고용하면, 출국 1개월 뒤 재입국해 일할 수 있고 한국어시험·취업교육이 면제됩니다. 요건이 까다로우니 고용센터에서 확인하세요.
    범죄경력이나 건강 문제는 자격에 영향을 줄 수 있어요. E-9은 허가받은 사업주·업종에 묶인 취업입니다 — 허용된 범위에서만 일하고, 최신 내용은 하이코리아·eps.go.kr에서 확인하세요.
my:
  title: E-9 အလုပ်ခွင့်ပြုစနစ် (EPS) — ကိုရီးယားတွင် ကျွမ်းကျင်မှုမလို အလုပ်
  summary: >-
    E-9 သည် ကိုရီးယား၏ အလုပ်ခွင့်ပြုစနစ် (고용허가제, EPS) အောက်တွင် ကျွမ်းကျင်မှုမလို
    အလုပ်လုပ်ရန် ဗီဇာဖြစ်သည် — စက်မှု၊ ဆောက်လုပ်ရေး၊ စိုက်ပျိုးမွေးမြူ၊ ငါးဖမ်းနှင့်
    အချို့ဝန်ဆောင်မှု။ ကိုရီးယားသည် မြန်မာနှင့် EPS ကို လုပ်ဆောင်သည်။ မိမိနိုင်ငံတွင်
    EPS-TOPIK အောင်ပြီး ကိုရီးယားအလုပ်ရှင်က ရွေးချယ်၍ ဗီဇာလျှောက်ပေးသည်။ အရည်အချင်း၊
    စာရွက်စာတမ်း၊ အဆင့်များနှင့် တရားမဝင် ပွဲစားများကို ရှောင်ရှားနည်း။
  eligibility: |-
    မြန်မာသည် ကိုရီးယား အလုပ်ခွင့်ပြုစနစ်(EPS) ၏ စေလွှတ်နိုင်ငံတစ်ခုဖြစ်သည်။ E-9 သည် EPS-TOPIK၊ စေလွှတ်အဖွဲ့အစည်းနှင့် ကိုရီးယားအလုပ်ရှင်၏ အလုပ်ခွင့်ပြု လုပ်ငန်းစဉ်များမှတစ်ဆင့် ဆောင်ရွက်သည်။
    E-9 တွင် လုပ်ငန်းအမျိုးအစားအလိုက် ခွင့်ပြုလုပ်ငန်းခွင် စံနှုန်းများ ကွဲပြားသည်။ စက်မှုလုပ်ငန်းတွင် SME စံနှုန်းက အဓိကဖြစ်ပြီး ဆောက်လုပ်ရေး၊ စိုက်ပျိုးမွေးမြူရေး၊ ငါးဖမ်းနှင့် ဝန်ဆောင်မှုလုပ်ငန်းများတွင် သီးခြားလိုအပ်ချက်များ ရှိသည်။
    ခွင့်ပြုလုပ်ငန်းနှင့် အမျိုးအစား — E-9-1 စက်မှု၊ E-9-2 ဆောက်လုပ်ရေး၊ E-9-3 စိုက်ပျိုးမွေးမြူ၊ E-9-4 ငါးဖမ်း၊ E-9-9 သစ်တောလုပ်ငန်း၊ E-9-10 သတ္တုတွင်း၊ E-9-5 အချို့ဝန်ဆောင်မှု (အအေးခန်းသိုလှောင်၊ သတ်မှတ်ဒေသ ဟိုတယ်/တည်းခို၊ စမ်းသပ်ဒေသ ကိုရီးယားစားသောက်ဆိုင် မီးဖိုချောင်ကူ၊ ပြန်လည်အသုံးပြုပစ္စည်းစုဆောင်း၊ ပါဆယ်တင်ချ)။ သစ်တော၊ သတ္တုတွင်း၊ ဟိုတယ်/တည်းခို၊ ကိုရီးယားစားသောက်ဆိုင်ကို ၂၀၂၄ တွင် ထပ်ထည့်သည်။
    နေထိုင်ခွင့်သည် စုစုပေါင်း အများဆုံး ၄ နှစ် ၁၀ လ (ပထမ ၃ နှစ် + တစ်ကြိမ် ၁ နှစ် ၁၀ လ တိုးခြင်း)။
    ကျွမ်းကျင်အရည်အချင်း လိုသော အလုပ်များ မပါဝင် — ၎င်းတို့သည် အခြားဗီဇာ။
  documents: |-
    အရေးကြီး — သင့် E-9 ဗီဇာကို သင့် ကိုရီးယားအလုပ်ရှင်က လျှောက်သော ဗီဇာထုတ်ပေးမှု အတည်ပြုလက်မှတ် (사증발급인정서) ဖြင့် ထုတ်ပေးသည် — သင်ကိုယ်တိုင် မဟုတ်ပါ။ သင့်ဘက်က အဆင့်များကို EPS နှင့် မိမိနိုင်ငံ စေလွှတ်ရေးအေဂျင်စီမှတစ်ဆင့် ဆောင်ရွက်သည်။
    သင့်ဘက်က (မြန်မာတွင်) — EPS-TOPIK အောင်ခြင်း၊ EPS အလုပ်ရှာစာရင်း မှတ်ပုံတင်ခြင်း၊ ကျန်းမာရေးစစ်ဆေးခြင်း၊ ရွေးချယ်ခံရပါက စံအလုပ်သမားစာချုပ် (표준근로계약서) လက်မှတ်ထိုးခြင်း
    သင့်ဘက်က — ရာဇဝတ်မှတ်တမ်း ထောက်ခံစာ (၃ လအတွင်း ထုတ်) နှင့် ကိုယ်တိုင်ရေး ကျန်းမာရေးအခြေအနေ ဖော်ပြချက် (တီဘီ၊ အသည်းရောင် B၊ ဆစ်ဖလစ် စသည် ဖော်ပြ) — ၂၀၁၂ မှစ၍ မဖြစ်မနေ
    အလုပ်ရှင်က လျှောက် — ဗီဇာထုတ်ပေးမှု လျှောက်လွှာ (별지 제21호 서식)၊ နိုင်ငံကူးလက်မှတ် မိတ္တူ/ဓာတ်ပုံ၊ စီးပွားရေးမှတ်ပုံတင်၊ အလုပ်ခွင့်ပြုလက်မှတ် (고용허가서) + စံအလုပ်သမားစာချုပ် မိတ္တူ၊ လုပ်ငန်းခွင် စစ်တမ်း — နှင့် လုပ်ငန်းအလိုက် ထပ်ဆောင်းစာရွက်
    사증발급인정서 ထွက်ပြီးနောက် မြန်မာရှိ ကိုရီးယားသံရုံးတွင် E-9 ဗီဇာ လျှောက်သည်
  steps: |-
    တရားဝင်လမ်းကြောင်းဖြင့် EPS-TOPIK အောင်ပြီး EPS အလုပ်ရှာစာရင်း (구직자명부) တွင် မှတ်ပုံတင်ပါ — ကိုရီးယား EPS (eps.go.kr) နှင့် မြန်မာ၏ တရားဝင် စေလွှတ်ရေးအေဂျင်စီမှတစ်ဆင့်။
    ပြည်တွင်းလူ မရှာနိုင်သော ကိုရီးယားအလုပ်ရှင်က စာရင်းမှ သင့်ကို ရွေးပြီး စံအလုပ်သမားစာချုပ် ချုပ်ဆိုသည်။
    အလုပ်ရှင်က အလုပ်ခွင့်ပြုလက်မှတ် (고용허가서) ရယူ၍ လူဝင်မှုတွင် 사증발급인정서 လျှောက်သည် (သို့မဟုတ် လုပ်ငန်းအလိုက် တရားဝင် ပံ့ပိုးရေးအဖွဲ့ — အသေးစားလုပ်ငန်းဗဟိုအဖွဲ့၊ ဆောက်လုပ်ရေး၊ ငါးဖမ်း၊ စိုက်ပျိုးရေးအသင်းများမှတစ်ဆင့်)။
    사증발급인정서 ထွက်ပါက သံရုံးတွင် E-9 ဗီဇာ လျှောက်ပြီး၊ သတ်မှတ်ရက်တွင် အဖွဲ့လိုက် ဝင်ရောက်၍ အလုပ်သင်တန်း/ကျန်းမာရေးစစ်ဆေးပြီး လုပ်ငန်းခွင်သို့ ခွဲတမ်းချသည်။
    ဝင်ရောက်ပြီးနောက် နိုင်ငံခြားသား မှတ်ပုံတင်ပါ။ နေထိုင်ခွင့် အများဆုံး ၄ နှစ် ၁၀ လ (၃ နှစ် + တိုးခြင်း)။
  watchout: |-
    EPS ကို အစိုးရများက လုပ်ဆောင်သည် — တရားဝင် EPS  ဝက်ဘ်ဆိုက် (eps.go.kr) နှင့် မြန်မာနိုင်ငံ၏ တရားဝင် စေလွှတ်ရေးအေဂျင်စီမှတစ်ဆင့်သာ သွားပါ။ အလုပ်/ဗီဇာကို 'ကိုယ်စားရှာပေးမည်' ဆိုကာ ငွေအများကြီး တောင်းသော တရားမဝင် ပွဲစားများကို အထူးသတိထားပါ။ E-9 အလုပ်သမားများ လိမ်လည်ခံရသည့် အဖြစ်အများဆုံးလမ်းမှာ တရားမဝင် ပွဲစားများဖြစ်သည်။ တရားဝင် EPS ကုန်ကျစရိတ်များ သတ်မှတ်ထားပြီး အများသိစေရန် ထုတ်ဖော်ပြထားပြီးဖြစ်သည်။
    လုပ်ငန်းခွင် ပြောင်းခြင်း (사업장 변경) သည် အကြိမ်ရေ/အကြောင်းရင်း ကန့်သတ်ထားပြီး စည်းမျဉ်း မကြာခဏ ပြောင်းသည်။ အလုပ်ထွက်ပါက သတ်မှတ် အလုပ်ရှာကာလအတွင်း လုပ်ငန်းခွင်အသစ် ရှာရမည်၊ မဟုတ်ပါက နေထိုင်ခွင့် ဆုံးရှုံးနိုင်သည် — စည်းမျဉ်းကို အလုပ်ဌာန (고용센터) နှင့် HiKorea တွင် အတည်ပြုပါ။
    သစ္စာရှိအလုပ်သမား ပြန်ဝင်ခွင့်: လုပ်ငန်းခွင် မပြောင်းဘဲ (သို့မဟုတ် တူညီလုပ်ငန်းတွင် ၄ နှစ် ၁၀ လ) အလုပ်ပြီးဆုံး၍ အလုပ်ရှင်က ပြန်ခန့်ပါက၊ ထွက်ခွာပြီး ၁ လအကြာတွင် ပြန်ဝင်အလုပ်လုပ်နိုင်ပြီး ကိုရီးယားစာမေးပွဲ/အလုပ်သင်တန်း ကင်းလွတ်သည်။ စည်းကမ်း တင်းကျပ်သဖြင့် အလုပ်ဌာနတွင် အတည်ပြုပါ။
    ရာဇဝတ်မှတ်တမ်း သို့မဟုတ် ကျန်းမာရေးပြဿနာများ အရည်အချင်းကို ထိခိုက်နိုင်သည်။ E-9 သည် ခွင့်ပြုထားသော အလုပ်ရှင်/လုပ်ငန်းနှင့် ချည်နှောင်ထားသည် — ခွင့်ပြုသည့်အတိုင်းသာ လုပ်ပြီး၊ နောက်ဆုံးအချက်များကို HiKorea နှင့် eps.go.kr တွင် အတည်ပြုပါ။
