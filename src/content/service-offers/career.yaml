title:
  en: Professional Career Application Support
  ko: 전문직 지원 준비
  my: Professional Career အလုပ်လျှောက်ရန် အကူအညီ
summary:
  en: For people applying to office, skilled, or professional roles who need a stronger resume, cover letter, job-specific customization, and interview preparation.
  ko: 사무직, 전문직 또는 경력직 지원을 위해 이력서, 자기소개서, 직무별 수정과 면접 준비가 필요한 분을 위한 서비스입니다.
  my: Office job၊ skilled job သို့မဟုတ် professional role လျှောက်မည့်သူများအတွက် resume၊ cover letter၊ job-specific customization နှင့် interview ပြင်ဆင်မှုကို ကူညီပါသည်။
recommendedFor:
  - en: You want to apply for a professional job in Korea and need your resume to look clearer.
    ko: 한국에서 전문직에 지원하고 싶고 이력서를 더 명확하게 만들고 싶은 분
    my: ကိုရီးယားတွင် professional အလုပ်လျှောက်ချင်ပြီး resume ကို ပိုရှင်းလင်းစေချင်သူ
  - en: You need to adjust your resume for a specific job post.
    ko: 특정 채용공고에 맞게 이력서를 수정하고 싶은 분
    my: Job post တစ်ခုနှင့်ကိုက်ညီအောင် resume ပြင်ချင်သူ
  - en: You want interview practice that fits your experience and target role.
    ko: 본인 경험과 목표 직무에 맞춘 면접 연습이 필요한 분
    my: ကိုယ့် experience နှင့် target role ကိုက်ညီသော interview practice လိုသူ
included:
  - title:
      en: Professional resume creation
      ko: 전문직 이력서 작성
      my: Professional resume ဖန်တီးခြင်း
    body:
      en: We organize your education, experience, projects, skills, and achievements into a clear resume.
      ko: 학력, 경력, 프로젝트, 기술과 성과를 읽기 쉬운 이력서로 정리합니다.
      my: ပညာရေး၊ career experience၊ projects၊ skills နှင့် achievements ကို ဖတ်ရလွယ်သော resume အဖြစ် စုစည်းပေးပါသည်။
  - title:
      en: Resume review
      ko: 이력서 검토
      my: Resume review
    body:
      en: We review structure, wording, missing points, and what may confuse the reader.
      ko: 구성, 표현, 빠진 내용과 읽는 사람이 헷갈릴 수 있는 부분을 확인합니다.
      my: ဖွဲ့စည်းပုံ၊ အသုံးအနှုန်း၊ လိုနေသောအချက်များနှင့် ဖတ်သူနားလည်ရခက်နိုင်သောနေရာများကို စစ်ဆေးပါသည်။
  - title:
      en: Job-specific customization
      ko: 직무별 맞춤 수정
      my: Job-specific customization
    body:
      en: We help match your resume and key points to a public job description.
      ko: 공개 채용공고에 맞게 이력서와 핵심 포인트를 조정합니다.
      my: Public job description နှင့်ကိုက်ညီအောင် resume နှင့် key points များကို ပြင်ဆင်ကူညီပါသည်။
  - title:
      en: Cover-letter support
      ko: 자기소개서 지원
      my: Cover letter အကူအညီ
    body:
      en: We help plan and improve the message, structure, and examples in your cover letter.
      ko: 자기소개서의 메시지, 구성과 예시를 정리하고 개선합니다.
      my: Cover letter ထဲရှိ message၊ structure နှင့် examples ကို စီစဉ်ပြင်ဆင်ကူညီပါသည်။
  - title:
      en: Professional interview preparation
      ko: 전문 면접 준비
      my: Professional interview ပြင်ဆင်ခြင်း
    body:
      en: We prepare common and role-specific questions with practical answer direction.
      ko: 공통 질문과 직무별 질문에 대한 실용적인 답변 방향을 준비합니다.
      my: Common questions နှင့် role-specific questions အတွက် လက်တွေ့ကျသော ဖြေဆိုနည်းကို ပြင်ဆင်ပါသည်။
deliverables:
  - en: Resume creation, review notes, or job-specific improvement draft based on the agreed scope
    ko: 합의한 범위에 따른 이력서 작성, 검토 메모 또는 직무별 개선안
    my: သဘောတူထားသောအတိုင်း resume ဖန်တီးမှု၊ review notes သို့မဟုတ် job-specific improvement draft
  - en: Cover-letter structure and wording suggestions
    ko: 자기소개서 구성과 표현 제안
    my: Cover letter structure နှင့် wording suggestion
  - en: Interview practice questions and answer direction
    ko: 면접 연습 질문과 답변 방향
    my: Interview practice questions နှင့် answer direction
preparation:
  - en: Your current resume, work history, education, and project notes
    ko: 현재 이력서, 경력, 학력과 프로젝트 메모
    my: လက်ရှိ resume၊ work history၊ education နှင့် project notes
  - en: The job post or job type you want to apply for
    ko: 지원하려는 채용공고 또는 직무 유형
    my: လျှောက်မည့် job post သို့မဟုတ် job type
  - en: Your strongest experience, skills, certificates, and preferred language for the final material
    ko: 가장 강한 경험, 기술, 자격증과 최종 자료 언어
    my: အကောင်းဆုံး experience၊ skills၊ certificates နှင့် final material ဘာသာစကား
process:
  - title:
      en: Send your goal by DM
      ko: 목표를 DM으로 공유
      my: သင့်ရည်ရွယ်ချက်ကို DM ပို့ပါ
    body:
      en: Tell us the role, deadline, and what material you need.
      ko: 지원 직무, 마감일과 필요한 자료를 알려주세요.
      my: လျှောက်မည့် role၊ deadline နှင့် လိုအပ်သော material ကို ပြောပါ။
  - title:
      en: Choose the support scope
      ko: 지원 범위 선택
      my: အကူအညီအတိုင်းအတာ ရွေးချယ်ခြင်း
    body:
      en: We confirm whether you need creation, review, customization, cover-letter help, or interview prep.
      ko: 작성, 검토, 맞춤 수정, 자기소개서 또는 면접 준비 중 필요한 범위를 확인합니다.
      my: Creation၊ review၊ customization၊ cover-letter help သို့မဟုတ် interview prep လိုအပ်မှုကို အတည်ပြုပါသည်။
  - title:
      en: Work on the material
      ko: 자료 작업
      my: Material ပြင်ဆင်ခြင်း
    body:
      en: We prepare the agreed items and explain what changed.
      ko: 합의한 항목을 준비하고 무엇이 바뀌었는지 설명합니다.
      my: သဘောတူထားသောအရာများကို ပြင်ဆင်ပြီး ဘာပြောင်းထားသလဲ ရှင်းပြပါသည်။
  - title:
      en: Final check before you apply
      ko: 지원 전 최종 확인
      my: မလျှောက်မီ နောက်ဆုံးစစ်ဆေးခြင်း
    body:
      en: You review the material, ask final questions, and submit it yourself.
      ko: 자료를 확인하고 마지막 질문을 한 뒤 지원은 본인이 직접 합니다.
      my: Material ကိုစစ်ဆေးပြီး နောက်ဆုံးမေးခွန်းများ မေးကာ ကိုယ်တိုင်လျှောက်ပါသည်။
