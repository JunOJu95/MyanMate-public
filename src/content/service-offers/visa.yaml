title:
  en: Visa 1:1 guidance
  ko: 비자 1:1 안내
  my: ဗီဇာ 1:1 အချက်အလက် လမ်းညွှန်
summary:
  en: We listen to your situation, research current public requirements, organize a personal checklist,
    and answer follow-up questions within the agreed scope. You make the final checks and complete every
    application step yourself.
  ko: 현재 상황을 확인하고 최신 공개 요건을 조사해 개인별 체크리스트로 정리한 뒤, 합의한 범위의 추가 질문에
    답변합니다. 최종 확인과 모든 신청 절차는 본인이 직접 진행합니다.
  my: သင့်လက်ရှိအခြေအနေကို နားထောင်ပြီး လက်ရှိတရားဝင်ထုတ်ပြန်ထားသော လိုအပ်ချက်များကို ရှာဖွေကာ
    သင်နှင့်ကိုက်ညီသည့် စစ်ဆေးစာရင်းအဖြစ် စုစည်းပေးပါသည်။ သဘောတူထားသည့် အတိုင်းအတာအတွင်း
    ထပ်ဆင့်မေးခွန်းများကို ဖြေကြားပေးပြီး နောက်ဆုံးအတည်ပြုခြင်းနှင့် လျှောက်ထားမှုအဆင့်အားလုံးကို
    သင်ကိုယ်တိုင် ဆောင်ရွက်ရပါမည်။
recommendedFor:
  - en: You want a clear order for where to start when checking public visa information.
    ko: 비자 관련 공개 정보를 어디서부터 확인해야 할지 순서를 정리하고 싶은 분
    my: အများပြည်သူကြည့်နိုင်သော ဗီဇာအချက်အလက်များကို မည်သည့်နေရာမှ စတင်စစ်ဆေးရမည်ကို
      အစီအစဉ်တကျ သိလိုသူ
  - en: Your work, study, family, or stay situation changed and you need current public requirements
      organized clearly.
    ko: 취업·학업·가족·체류 상황이 달라져 현재 공개 요건을 한눈에 정리할 필요가 있는 분
    my: အလုပ်၊ ပညာသင်ကြားမှု၊ မိသားစု သို့မဟုတ် နေထိုင်မှုအခြေအနေ ပြောင်းလဲသွား၍ လက်ရှိ
      ထုတ်ပြန်ထားသော လိုအပ်ချက်များကို ရှင်းလင်းစွာ စုစည်းသိလိုသူ
  - en: You have read official pages but want a checklist of what to confirm next.
    ko: 공식 안내를 읽었지만 다음에 무엇을 확인해야 할지 체크리스트가 필요한 분
    my: တရားဝင်စာမျက်နှာများကို ဖတ်ပြီးသော်လည်း နောက်ထပ်စစ်ဆေးရမည့်အချက်များကို စာရင်းဖြင့်
      သိလိုသူ
included:
  - title:
      en: Understand your situation
      ko: 현재 상황 확인
      my: လက်ရှိအခြေအနေကို နားလည်ခြင်း
    body:
      en: We identify your current status, goal, timing, and known constraints using only the information
        needed for guidance.
      ko: 안내에 필요한 범위에서 현재 체류 상황, 목표, 일정과 이미 알고 있는 제약사항을 확인합니다.
      my: လမ်းညွှန်ရန်လိုအပ်သည့် အချက်အလက်များကိုသာ အသုံးပြုပြီး လက်ရှိနေထိုင်မှုအခြေအနေ၊ ရည်ရွယ်ချက်၊
        အချိန်နှင့် သိရှိထားသော ကန့်သတ်ချက်များကို အတူစစ်ဆေးပါသည်။
  - title:
      en: Research current public requirements
      ko: 최신 공개 요건 조사
      my: လက်ရှိထုတ်ပြန်ထားသော လိုအပ်ချက်များကို ရှာဖွေခြင်း
    body:
      en: We research current information published by Immigration, HiKorea, and other responsible public
        bodies, and mark the points you should confirm with them.
      ko: 출입국·하이코리아 등 담당 공공기관이 공개한 최신 정보를 조사하고, 해당 기관에 직접 확인할 포인트를 표시합니다.
      my: လူဝင်မှုကြီးကြပ်ရေး၊ HiKorea နှင့် သက်ဆိုင်ရာ အစိုးရဌာနများက ထုတ်ပြန်ထားသော လက်ရှိ
        အချက်အလက်များကို ရှာဖွေပြီး သင်ကိုယ်တိုင် အတည်ပြုသင့်သည့် အချက်များကို မှတ်သားပေးပါသည်။
  - title:
      en: Organize a personal checklist
      ko: 개인별 체크리스트 정리
      my: ကိုယ်ပိုင်စစ်ဆေးစာရင်း စုစည်းခြင်း
    body:
      en: We organize required and conditional items, questions for the responsible authority, and your
        next actions in a practical order.
      ko: 필수·조건부 확인 항목, 담당 기관에 물어볼 질문과 본인이 할 다음 행동을 실용적인 순서로 정리합니다.
      my: မဖြစ်မနေစစ်ဆေးရမည့်အချက်များ၊ အခြေအနေပေါ်မူတည်သည့်အချက်များ၊ သက်ဆိုင်ရာဌာနကို
        မေးမြန်းရမည့်မေးခွန်းများနှင့် သင်ကိုယ်တိုင် ဆက်လုပ်ရမည့်အဆင့်များကို အစီအစဉ်တကျ စုစည်းပေးပါသည်။
  - title:
      en: Answer agreed follow-up questions
      ko: 합의한 범위의 추가 질문 답변
      my: သဘောတူထားသည့်အတိုင်းအတာအတွင်း ထပ်ဆင့်မေးခွန်း ဖြေကြားခြင်း
    body:
      en: We clarify the checklist and public sources when questions come up within the scope agreed in DM.
      ko: DM에서 합의한 범위 안에서 체크리스트와 공개 확인처에 관한 추가 질문을 설명합니다.
      my: DM တွင် သဘောတူထားသည့် အတိုင်းအတာအတွင်း စစ်ဆေးစာရင်းနှင့် တရားဝင်အချက်အလက်ရင်းမြစ်များအပေါ်
        ထပ်ဆင့်မေးခွန်းများကို ရှင်းပြပေးပါသည်။
process:
  - title:
      en: Confirm scope and cost by DM
      ko: DM으로 범위·비용 확인
      my: DM ဖြင့် အတိုင်းအတာနှင့် ကုန်ကျစရိတ် စစ်ဆေးခြင်း
    body:
      en: Send the short first message. We confirm what can be covered, timing, and cost before you decide.
      ko: 짧은 첫 메시지를 보내면 결정 전에 가능한 범위, 일정과 비용을 확인합니다.
      my: ပထမဆုံး မက်ဆေ့ချ်တိုကို ပို့ပါ။ သင်မဆုံးဖြတ်မီ ကူညီနိုင်သည့်အတိုင်းအတာ၊ အချိန်နှင့်
        ကုန်ကျစရိတ်ကို အတူစစ်ဆေးပါမည်။
  - title:
      en: Share the essential situation
      ko: 필요한 상황만 공유
      my: လိုအပ်သောအခြေအနေကိုသာ မျှဝေခြင်း
    body:
      en: Share only the situation and information needed, without passport or foreign resident
        registration numbers.
      ko: 여권번호, 외국인등록번호 없이 필요한 상황과 정보만 공유합니다.
      my: နိုင်ငံကူးလက်မှတ်နံပါတ်နှင့် နိုင်ငံခြားသားမှတ်ပုံတင်နံပါတ် မပါဘဲ လိုအပ်သော အခြေအနေနှင့်
        အချက်အလက်များကိုသာ မျှဝေပါ။
  - title:
      en: Research and organize
      ko: 공개 요건 조사·정리
      my: ထုတ်ပြန်ထားသော လိုအပ်ချက်များကို ရှာဖွေစုစည်းခြင်း
    body:
      en: We check current public sources and organize the relevant requirements and confirmation points.
      ko: 최신 공개 확인처를 살펴보고 관련 요건과 직접 확인할 포인트를 정리합니다.
      my: လက်ရှိတရားဝင်အချက်အလက်ရင်းမြစ်များကို စစ်ဆေးပြီး သက်ဆိုင်ရာလိုအပ်ချက်များနှင့် သင်ကိုယ်တိုင်
        အတည်ပြုရမည့်အချက်များကို စုစည်းပါသည်။
  - title:
      en: Receive the checklist and ask follow-up questions
      ko: 체크리스트 확인·추가 질문
      my: စစ်ဆေးစာရင်းကို လက်ခံပြီး ထပ်ဆင့်မေးမြန်းခြင်း
    body:
      en: Review the checklist and ask follow-up questions if there is anything else you need.
      ko: 체크리스트를 확인하고 필요한 사항이 있다면 추가 질문합니다.
      my: စစ်ဆေးစာရင်းကို ကြည့်ရှုပြီး လိုအပ်သည့်အချက်ရှိပါက ထပ်ဆင့်မေးမြန်းနိုင်ပါသည်။
deliverables:
  - en: A personal checklist with relevant public sources and final confirmation points
    ko: 관련 공개 확인처와 최종 확인 포인트가 포함된 개인별 체크리스트
    my: သက်ဆိုင်ရာ တရားဝင်အချက်အလက်ရင်းမြစ်များနှင့် နောက်ဆုံးအတည်ပြုရမည့်အချက်များ ပါဝင်သော
      ကိုယ်ပိုင်စစ်ဆေးစာရင်း
  - en: A concise list of questions to ask Immigration, HiKorea, or another responsible authority
    ko: 출입국·하이코리아 등 담당 기관에 직접 물어볼 질문 목록
    my: လူဝင်မှုကြီးကြပ်ရေး၊ HiKorea သို့မဟုတ် သက်ဆိုင်ရာဌာနကို ကိုယ်တိုင်မေးမြန်းရန် မေးခွန်းစာရင်း
  - en: Clarifications for follow-up questions within the scope agreed in DM
    ko: DM에서 합의한 범위의 추가 질문에 대한 설명
    my: DM တွင် သဘောတူထားသည့် အတိုင်းအတာအတွင်း ထပ်ဆင့်မေးခွန်းများအတွက် ရှင်းလင်းချက်
preparation:
  - en: Your current visa type, approximate expiry date, goal, and important timing
    ko: 현재 비자 종류, 대략적인 만료일, 목표와 중요한 일정
    my: လက်ရှိဗီဇာအမျိုးအစား၊ ခန့်မှန်းသက်တမ်းကုန်ရက်၊ ရည်ရွယ်ချက်နှင့် အရေးကြီးသည့်အချိန်
  - en: Relevant official notices with passport, resident registration, and other sensitive numbers hidden
    ko: 여권번호·외국인등록번호 등 민감한 번호를 가린 관련 공식 안내문
    my: နိုင်ငံကူးလက်မှတ်၊ နိုင်ငံခြားသားမှတ်ပုံတင်နှင့် အခြားအရေးကြီးနံပါတ်များကို ဖုံးထားသော
      သက်ဆိုင်ရာ တရားဝင်အကြောင်းကြားစာ
  - en: The questions you most want answered; do not send passwords or financial information
    ko: 가장 확인하고 싶은 질문 — 비밀번호나 금융정보는 보내지 마세요
    my: အဓိကသိလိုသည့်မေးခွန်းများ — စကားဝှက် သို့မဟုတ် ငွေကြေးအချက်အလက်များကို မပို့ပါနှင့်
