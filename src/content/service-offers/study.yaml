title:
  en: Study in Korea Preparation
  ko: 한국 유학 준비
  my: ကိုရီးယားတွင် ကျောင်းတက်ရန် ပြင်ဆင်မှု
summary:
  en: One clear service for Burmese students preparing D-4-1 language study, D-2 university study, study plans, and admission interviews.
  ko: D-4-1 어학연수, D-2 대학 진학, 학업계획서와 입학 면접을 준비하는 미얀마 학생을 위한 통합 서비스입니다.
  my: D-4-1 ဘာသာစကားကျောင်း၊ D-2 တက္ကသိုလ်၊ study plan နှင့် admission interview ပြင်ဆင်မည့် မြန်မာကျောင်းသားများအတွက် တစ်နေရာတည်းသော အကူအညီဖြစ်ပါသည်။
recommendedFor:
  - en: You want to study in Korea but do not know what to prepare first.
    ko: 한국 유학을 준비하고 싶지만 무엇부터 해야 할지 모르는 분
    my: ကိုရီးယားတွင် ကျောင်းတက်ချင်သော်လည်း ဘာကစပြင်ရမလဲ မသိသူ
  - en: You are preparing D-4-1 language study or D-2 university admission.
    ko: D-4-1 어학연수 또는 D-2 대학 입학을 준비하는 분
    my: D-4-1 language study သို့မဟုတ် D-2 university admission ပြင်ဆင်နေသူ
  - en: You need help writing, editing, or practicing for school documents and interviews.
    ko: 학업계획서 작성·수정 또는 면접 연습이 필요한 분
    my: Study plan ရေးရန်၊ ပြင်ရန် သို့မဟုတ် interview လေ့ကျင့်ရန် လိုသူ
included:
  - title:
      en: D-4-1 Study Preparation
      ko: D-4-1 어학연수 준비
      my: D-4-1 Study Preparation
    body:
      en: We help organize the basic preparation list for Korean language study applications.
      ko: 한국어 어학연수 지원을 위한 기본 준비 목록을 정리합니다.
      my: Korean language study လျှောက်ရန် အခြေခံပြင်ဆင်ရမည့်စာရင်းကို စုစည်းကူညီပါသည်။
  - title:
      en: D-2 University Preparation
      ko: D-2 대학 준비
      my: D-2 University Preparation
    body:
      en: We help check school application points, timelines, and what to confirm with the university.
      ko: 학교 지원 포인트, 일정과 대학에 확인할 내용을 정리합니다.
      my: University application points၊ timeline နှင့် university တွင် အတည်ပြုရန်အချက်များကို စုစည်းပါသည်။
  - title:
      en: Study Plan Writing & Editing
      ko: 학업계획서 작성 및 수정
      my: Study Plan Writing & Editing
    body:
      en: We help plan, write, review, and improve your study plan in a clear structure.
      ko: 학업계획서의 구성, 작성, 검토와 개선을 돕습니다.
      my: Study plan ကို structure ရှင်းရှင်းဖြင့် စီစဉ်၊ ရေးသား၊ စစ်ဆေး၊ ပြင်ဆင်ကူညီပါသည်။
  - title:
      en: Admission Interview Preparation
      ko: 입학 면접 준비
      my: Admission Interview Preparation
    body:
      en: We practice common school interview questions and simple answer direction.
      ko: 학교 면접에서 자주 나오는 질문과 쉬운 답변 방향을 연습합니다.
      my: School interview တွင် မေးလေ့ရှိသော မေးခွန်းများနှင့် ရိုးရှင်းသောဖြေဆိုနည်းကို လေ့ကျင့်ပါသည်။
  - title:
      en: Complete Study Application Preparation
      ko: 유학 지원 통합 준비
      my: Complete Study Application Preparation
    body:
      en: If you need several items together, we can discuss a combined preparation package by DM.
      ko: 여러 항목이 함께 필요하면 DM으로 통합 준비 패키지를 상담할 수 있습니다.
      my: အကြောင်းအရာများစွာကို တစ်ခါတည်းလိုအပ်ပါက DM မှ combined package ဆွေးနွေးနိုင်ပါသည်။
deliverables:
  - en: A clear preparation checklist for your selected study path
    ko: 선택한 유학 경로에 맞춘 준비 체크리스트
    my: ရွေးချယ်ထားသော study path အတွက် ပြင်ဆင်စစ်ဆေးစာရင်း
  - en: Study-plan draft, edit notes, or interview practice notes based on scope
    ko: 범위에 따른 학업계획서 초안, 수정 메모 또는 면접 연습 메모
    my: Scope အလိုက် study-plan draft၊ edit notes သို့မဟုတ် interview practice notes
  - en: Questions to confirm with the school or official source
    ko: 학교 또는 공식 확인처에 물어볼 질문
    my: School သို့မဟုတ် official source တွင် မေးရန်မေးခွန်းများ
preparation:
  - en: Your target school, course, intake, and deadline if known
    ko: 알고 있다면 목표 학교, 과정, 입학 시기와 마감일
    my: သိပြီးပါက target school၊ course၊ intake နှင့် deadline
  - en: Your education history, Korean level, goal, and reason for studying in Korea
    ko: 학력, 한국어 수준, 목표와 한국 유학 이유
    my: Education history၊ Korean level၊ goal နှင့် ကိုရီးယားတွင် ကျောင်းတက်လိုသောအကြောင်းရင်း
  - en: Any school notice or document list with sensitive numbers hidden
    ko: 민감번호를 가린 학교 안내문 또는 서류 목록
    my: Sensitive numbers ဖုံးထားသော school notice သို့မဟုတ် document list
process:
  - title:
      en: Choose your study path
      ko: 유학 경로 선택
      my: Study path ရွေးချယ်ခြင်း
    body:
      en: Tell us whether you need D-4-1, D-2, study plan, interview, or a complete package.
      ko: D-4-1, D-2, 학업계획서, 면접 또는 통합 패키지가 필요한지 알려주세요.
      my: D-4-1၊ D-2၊ study plan၊ interview သို့မဟုတ် complete package လိုသလား ပြောပါ။
  - title:
      en: Confirm scope and timeline
      ko: 범위와 일정 확인
      my: Scope နှင့် timeline အတည်ပြုခြင်း
    body:
      en: We confirm what can be prepared before your deadline.
      ko: 마감일 전에 준비 가능한 범위를 확인합니다.
      my: Deadline မတိုင်မီ ပြင်ဆင်နိုင်မည့်အတိုင်းအတာကို အတည်ပြုပါသည်။
  - title:
      en: Prepare the agreed items
      ko: 합의한 항목 준비
      my: သဘောတူထားသောအရာများ ပြင်ဆင်ခြင်း
    body:
      en: We organize the checklist, plan, edits, or interview practice agreed by DM.
      ko: DM에서 합의한 체크리스트, 계획서, 수정 또는 면접 연습을 진행합니다.
      my: DM တွင်သဘောတူထားသော checklist၊ plan၊ edit သို့မဟုတ် interview practice ကို ပြင်ဆင်ပါသည်။
  - title:
      en: You confirm and apply
      ko: 직접 확인하고 지원
      my: ကိုယ်တိုင်အတည်ပြုပြီး လျှောက်ပါ
    body:
      en: You confirm final school and visa requirements with official sources and submit yourself.
      ko: 최종 학교·비자 요건은 공식 확인처에서 직접 확인하고 제출은 본인이 합니다.
      my: နောက်ဆုံး school နှင့် visa requirements ကို official source တွင် ကိုယ်တိုင်အတည်ပြုပြီး ကိုယ်တိုင်တင်သွင်းပါသည်။
