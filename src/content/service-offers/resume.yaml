title:
  en: Resume 1:1 feedback
  ko: 이력서 1:1 피드백
  my: ကိုယ်ရေးရာဇဝင် 1:1 အကြံပြုချက်
summary:
  en: We review your existing resume and give itemized feedback on its structure and wording. You make the
    final changes yourself; this service does not provide a rewritten file or connect you with a job.
  ko: 기존 이력서의 구성과 표현을 검토해 항목별 피드백을 드립니다. 최종 수정은 본인이 직접 하며, 수정된 파일을
    제공하거나 일자리를 연결하지 않습니다.
  my: သင်ရေးသားထားပြီးသော ကိုယ်ရေးရာဇဝင်၏ ဖွဲ့စည်းပုံနှင့် အသုံးအနှုန်းများကို စစ်ဆေးပြီး အချက်အလိုက်
    အကြံပြုချက်ပေးပါသည်။ နောက်ဆုံးပြင်ဆင်မှုကို သင်ကိုယ်တိုင် ပြုလုပ်ရပြီး ပြန်လည်ရေးသားထားသောဖိုင်ကို
    မပေးသလို အလုပ်နှင့်လည်း ချိတ်ဆက်ပေးခြင်း မရှိပါ။
recommendedFor:
  - en: You already have a resume but are unsure whether its structure fits a Korean application.
    ko: 기존 이력서가 있지만 한국 지원 방식에 맞는 구성인지 확신이 없는 분
    my: ကိုယ်ရေးရာဇဝင်ရှိပြီးသားဖြစ်သော်လည်း ကိုရီးယားအလုပ်လျှောက်ရာတွင် သင့်တော်သည့်ဖွဲ့စည်းပုံဖြစ်မဖြစ်
      မသေချာသူ
  - en: Your experience feels vague or difficult to understand and you want wording feedback.
    ko: 경력과 경험 표현이 모호하거나 이해하기 어려워 표현 피드백이 필요한 분
    my: မိမိ၏ လုပ်ငန်းအတွေ့အကြုံဖော်ပြချက် မရှင်းလင်းသဖြင့် အသုံးအနှုန်းအပေါ် အကြံပြုချက်လိုသူ
  - en: You want a prioritized review checklist before editing and applying yourself.
    ko: 직접 수정하고 지원하기 전에 우선순위가 있는 검토 체크리스트를 받고 싶은 분
    my: ကိုယ်တိုင်ပြင်ဆင်ပြီး အလုပ်လျှောက်မီ ဦးစားပေးအစီအစဉ်ပါသော စစ်ဆေးစာရင်းလိုသူ
included:
  - title:
      en: Understand your target role
      ko: 지원 목표 확인
      my: လျှောက်ထားလိုသည့်အလုပ်ကို နားလည်ခြင်း
    body:
      en: We ask about the type of role you are considering so the feedback has a clear reading context.
      ko: 이력서를 어떤 관점에서 읽어야 할지 정하기 위해 고려 중인 직무 유형을 확인합니다.
      my: အကြံပြုချက်ပေးရာတွင် ရည်ရွယ်ချက်ရှင်းလင်းစေရန် သင်စဉ်းစားနေသော အလုပ်တာဝန်အမျိုးအစားကို
        မေးမြန်းပါသည်။
  - title:
      en: Review structure and order
      ko: 구성과 순서 검토
      my: ဖွဲ့စည်းပုံနှင့် အစီအစဉ်ကို စစ်ဆေးခြင်း
    body:
      en: We point out where contact details, experience, education, skills, and other relevant sections
        could be easier to scan.
      ko: 연락처, 경력·경험, 학력, 기술 등 필요한 항목의 순서와 읽기 쉬운 정도를 살펴봅니다.
      my: ဆက်သွယ်ရန်အချက်အလက်၊ လုပ်ငန်းအတွေ့အကြုံ၊ ပညာအရည်အချင်း၊ ကျွမ်းကျင်မှုနှင့် သက်ဆိုင်ရာ
        အပိုင်းများကို ဖတ်ရလွယ်ကူစေရန် ပြင်ဆင်သင့်သည့်နေရာများကို ထောက်ပြပါသည်။
  - title:
      en: Give wording feedback
      ko: 표현 피드백
      my: အသုံးအနှုန်းအပေါ် အကြံပြုချက်
    body:
      en: We flag vague, repetitive, or hard-to-follow wording and explain how to make the role, action,
        and result clearer in your own words.
      ko: 모호하거나 반복되거나 이해하기 어려운 표현을 표시하고, 역할·행동·결과를 본인의 말로 더 분명하게 만드는 방향을 설명합니다.
      my: မရှင်းလင်းသော၊ ထပ်ခါတလဲလဲဖြစ်သော သို့မဟုတ် နားလည်ရခက်သော အသုံးအနှုန်းများကို ထောက်ပြပြီး
        တာဝန်၊ လုပ်ဆောင်ချက်နှင့် ရလဒ်ကို သင့်ကိုယ်ပိုင်စကားဖြင့် ပိုမိုရှင်းလင်းစေရန် လမ်းညွှန်ပါသည်။
  - title:
      en: Prioritize your next edits
      ko: 직접 수정할 우선순위 정리
      my: ကိုယ်တိုင်ပြင်ဆင်ရန် ဦးစားပေးအစီအစဉ်
    body:
      en: We organize the feedback into practical priorities so you can revise the file yourself.
      ko: 본인이 파일을 직접 수정할 수 있도록 피드백을 실용적인 우선순위로 정리합니다.
      my: ဖိုင်ကို သင်ကိုယ်တိုင်ပြင်ဆင်နိုင်ရန် အကြံပြုချက်များကို လက်တွေ့ကျသည့် ဦးစားပေးအစီအစဉ်ဖြင့်
        စုစည်းပေးပါသည်။
process:
  - title:
      en: Confirm scope and cost by DM
      ko: DM으로 범위·비용 확인
      my: DM ဖြင့် အတိုင်းအတာနှင့် ကုန်ကျစရိတ် စစ်ဆေးခြင်း
    body:
      en: Send the short first message. We confirm what can be reviewed, timing, and cost before you decide.
      ko: 짧은 첫 메시지를 보내면 결정 전에 검토 가능한 범위, 일정과 비용을 확인합니다.
      my: ပထမဆုံး မက်ဆေ့ချ်တိုကို ပို့ပါ။ သင်မဆုံးဖြတ်မီ စစ်ဆေးပေးနိုင်သည့်အတိုင်းအတာ၊ အချိန်နှင့်
        ကုန်ကျစရိတ်ကို အတူစစ်ဆေးပါမည်။
  - title:
      en: Send a redacted resume
      ko: 민감정보를 가린 이력서 전달
      my: အရေးကြီးအချက်အလက်များ ဖုံးထားသော ကိုယ်ရေးရာဇဝင် ပို့ခြင်း
    body:
      en: Send your existing resume after hiding passport, resident registration, financial, and other
        unnecessary sensitive information.
      ko: 여권번호·외국인등록번호·금융정보 등 불필요한 민감정보를 가린 기존 이력서를 보냅니다.
      my: နိုင်ငံကူးလက်မှတ်နံပါတ်၊ နိုင်ငံခြားသားမှတ်ပုံတင်နံပါတ်၊ ငွေကြေးအချက်အလက်နှင့် အခြား
        မလိုအပ်သော အရေးကြီးအချက်အလက်များကို ဖုံးထားပြီး လက်ရှိကိုယ်ရေးရာဇဝင်ကို ပို့ပါ။
  - title:
      en: Receive itemized feedback
      ko: 항목별 피드백 확인
      my: အချက်အလိုက် အကြံပြုချက် လက်ခံခြင်း
    body:
      en: We send structured feedback on the overall order, each section, and wording that needs attention.
      ko: 전체 순서, 각 항목과 살펴볼 표현을 나누어 정리한 피드백을 보냅니다.
      my: စုစုပေါင်းအစီအစဉ်၊ အပိုင်းတစ်ခုချင်းစီနှင့် သတိပြုရမည့် အသုံးအနှုန်းများကို ခွဲခြား၍
        စနစ်တကျ အကြံပြုချက်ပေးပါသည်။
  - title:
      en: Revise it yourself and ask agreed questions
      ko: 직접 수정·합의한 질문 확인
      my: ကိုယ်တိုင်ပြင်ဆင်ပြီး သဘောတူထားသည့် မေးခွန်းများ မေးမြန်းခြင်း
    body:
      en: Apply the feedback yourself, then ask clarification questions within the scope agreed in DM.
      ko: 피드백을 반영해 본인이 직접 수정한 뒤, DM에서 합의한 범위의 확인 질문을 합니다.
      my: အကြံပြုချက်များအတိုင်း သင်ကိုယ်တိုင်ပြင်ဆင်ပြီးနောက် DM တွင် သဘောတူထားသည့်
        အတိုင်းအတာအတွင်း ရှင်းလင်းမေးမြန်းနိုင်ပါသည်။
deliverables:
  - en: An itemized DM message covering structure, section order, and wording feedback
    ko: 구성, 항목 순서와 표현 피드백을 나눈 항목별 DM 메시지
    my: ဖွဲ့စည်းပုံ၊ အပိုင်းအစီအစဉ်နှင့် အသုံးအနှုန်းအပေါ် အကြံပြုချက်များ ပါဝင်သော
      အချက်အလိုက် DM မက်ဆေ့ချ်
  - en: A prioritized checklist for the changes you will make yourself
    ko: 본인이 직접 수정할 내용의 우선순위 체크리스트
    my: သင်ကိုယ်တိုင် ပြင်ဆင်ရန်အချက်များ၏ ဦးစားပေးစစ်ဆေးစာရင်း
  - en: Clarifications for questions within the scope agreed in DM
    ko: DM에서 합의한 범위의 확인 질문에 대한 설명
    my: DM တွင် သဘောတူထားသည့် အတိုင်းအတာအတွင်း မေးခွန်းများအတွက် ရှင်းလင်းချက်
preparation:
  - en: Your current resume with passport, resident registration, financial, and other sensitive details hidden
    ko: 여권번호·외국인등록번호·금융정보 등 민감정보를 가린 현재 이력서
    my: နိုင်ငံကူးလက်မှတ်၊ နိုင်ငံခြားသားမှတ်ပုံတင်၊ ငွေကြေးနှင့် အခြားအရေးကြီးအချက်အလက်များကို
      ဖုံးထားသော လက်ရှိကိုယ်ရေးရာဇဝင်
  - en: The type of role you are considering and a public job description if one is relevant
    ko: 고려 중인 직무 유형과 관련 있다면 공개된 채용 공고 내용
    my: သင်စဉ်းစားနေသော အလုပ်တာဝန်အမျိုးအစားနှင့် သက်ဆိုင်ပါက အများပြည်သူကြည့်နိုင်သော အလုပ်ခေါ်စာ
  - en: The sections or wording you are most unsure about; do not send passwords or financial information
    ko: 가장 고민되는 항목이나 표현 — 비밀번호나 금융정보는 보내지 마세요
    my: အထူးစိုးရိမ်နေသော အပိုင်း သို့မဟုတ် အသုံးအနှုန်း — စကားဝှက် သို့မဟုတ် ငွေကြေးအချက်အလက်များကို
      မပို့ပါနှင့်
