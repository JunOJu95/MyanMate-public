title:
  en: Home-Viewing Companion & Area Check
  ko: 집 보기 동행 및 주변 확인
  my: အိမ်ကြည့်အတူလိုက်ခြင်းနှင့် ပတ်ဝန်းကျင်စစ်ဆေးခြင်း
summary:
  en: We accompany you to homes you already found, help you observe the room and area, and summarize what to compare before you decide.
  ko: 고객이 직접 찾은 집을 보러 갈 때 동행해 방과 주변을 함께 확인하고 결정 전 비교할 점을 정리합니다.
  my: သင်ကိုယ်တိုင်ရှာထားသောအိမ်များကို သွားကြည့်ရာတွင် အတူလိုက်ကာ အခန်းအခြေအနေ၊ building နှင့် ပတ်ဝန်းကျင်ကို စစ်ဆေးပြီး ဆုံးဖြတ်မီ နှိုင်းယှဉ်ရမည့်အချက်များကို စုစည်းပေးပါသည်။
recommendedFor:
  - en: You found a room but feel unsure about checking it alone.
    ko: 방을 찾았지만 혼자 확인하기 불안한 분
    my: အခန်းရှာထားပြီးသားဖြစ်သော်လည်း တစ်ယောက်တည်းသွားကြည့်ရန် မသေချာသူ
  - en: You need help asking simple questions during the viewing.
    ko: 집 보기 중 간단한 질문을 하는 데 도움이 필요한 분
    my: အိမ်ကြည့်ရာတွင် မေးခွန်းများမေးရန် အကူအညီလိုသူ
  - en: You want to compare room condition, transport, and neighborhood before deciding.
    ko: 결정 전에 방 상태, 교통과 주변 환경을 비교하고 싶은 분
    my: မဆုံးဖြတ်မီ အခန်းအခြေအနေ၊ transportation နှင့် neighborhood ကို နှိုင်းယှဉ်ချင်သူ
included:
  - title:
      en: Room-condition checklist
      ko: 방 상태 체크리스트
      my: Room-condition checklist
    body:
      en: We help check visible points like light, smell, noise, water, heating, storage, and basic damage.
      ko: 채광, 냄새, 소음, 물, 난방, 수납과 눈에 보이는 손상 등을 확인합니다.
      my: အလင်းရောင်၊ အနံ့၊ ဆူညံသံ၊ ရေ၊ heating၊ storage နှင့် မြင်နိုင်သောပျက်စီးမှုများကို စစ်ဆေးကူညီပါသည်။
  - title:
      en: Building and shared-area observation
      ko: 건물 및 공용공간 확인
      my: Building နှင့် shared-area observation
    body:
      en: We observe entrances, stairs, elevator, hallway, security, trash area, and shared spaces.
      ko: 출입구, 계단, 엘리베이터, 복도, 보안, 쓰레기장과 공용공간을 살펴봅니다.
      my: ဝင်ပေါက်၊ လှေကား၊ elevator၊ hallway၊ security၊ အမှိုက်နေရာနှင့် shared spaces များကို စစ်ဆေးပါသည်။
  - title:
      en: Transportation and neighborhood check
      ko: 교통 및 주변 확인
      my: Transportation နှင့် neighborhood check
    body:
      en: We check nearby transport, convenience stores, daily-life spots, and walking feel around the area.
      ko: 주변 교통, 편의점, 생활시설과 걸어 다닐 때의 느낌을 확인합니다.
      my: အနီးအနား transportation၊ convenience store၊ daily-life spots နှင့် လမ်းလျှောက်သွားလာရလွယ်မှုကို စစ်ဆေးပါသည်။
  - title:
      en: Questions for the licensed realtor
      ko: 공인중개사에게 물어볼 질문
      my: Licensed realtor ကို မေးရန်မေးခွန်းများ
    body:
      en: We help prepare questions about fees, maintenance cost, contract period, options, and repair responsibility.
      ko: 중개수수료, 관리비, 계약기간, 옵션과 수리 책임에 대해 물어볼 질문을 준비합니다.
      my: Brokerage fee၊ maintenance cost၊ contract period၊ options နှင့် repair responsibility အကြောင်း မေးရန်မေးခွန်းများကို ပြင်ဆင်ကူညီပါသည်။
  - title:
      en: Observation summary
      ko: 관찰 요약
      my: Observation summary
    body:
      en: After the viewing, we send a short summary of what looked good, what to confirm, and what to compare.
      ko: 집을 본 뒤 좋았던 점, 확인할 점과 비교할 점을 짧게 정리합니다.
      my: အိမ်ကြည့်ပြီးနောက် ကောင်းသောအချက်၊ အတည်ပြုရန်အချက်နှင့် နှိုင်းယှဉ်ရန်အချက်များကို အနှစ်ချုပ်ပို့ပါသည်။
deliverables:
  - en: Room and area checklist notes
    ko: 방과 주변 체크리스트 메모
    my: အခန်းနှင့်ပတ်ဝန်းကျင် checklist notes
  - en: Questions to ask the licensed realtor
    ko: 공인중개사에게 물어볼 질문
    my: Licensed realtor ကို မေးရန်မေးခွန်းများ
  - en: Short observation summary after viewing
    ko: 집 보기 후 짧은 관찰 요약
    my: အိမ်ကြည့်ပြီးနောက် observation summary တို
preparation:
  - en: Viewing time, address, and number of rooms you arranged yourself
    ko: 본인이 직접 정한 방문 시간, 주소와 볼 방의 수
    my: သင်ကိုယ်တိုင်ချိန်းထားသော အချိန်၊ လိပ်စာနှင့် ကြည့်မည့်အခန်းအရေအတွက်
  - en: Your budget, preferred area, and must-have conditions
    ko: 예산, 희망 지역과 꼭 필요한 조건
    my: Budget၊ preferred area နှင့် မဖြစ်မနေလိုအပ်သောအချက်များ
  - en: Any listing links or photos you already have
    ko: 가지고 있는 매물 링크나 사진
    my: ရှိထားသော listing links သို့မဟုတ် photos
process:
  - title:
      en: Send the viewing plan
      ko: 집 보기 일정 공유
      my: အိမ်ကြည့်အစီအစဉ် ပို့ပါ
    body:
      en: Send the date, area, room count, and what worries you most.
      ko: 날짜, 지역, 볼 방의 수와 가장 걱정되는 점을 보내주세요.
      my: ရက်၊ နေရာ၊ ကြည့်မည့်အခန်းအရေအတွက်နှင့် အစိုးရိမ်ဆုံးအချက်ကို ပို့ပါ။
  - title:
      en: Confirm companion scope
      ko: 동행 범위 확인
      my: အတူလိုက်မည့်အတိုင်းအတာ အတည်ပြုခြင်း
    body:
      en: We confirm time, route, cost, and what can be checked during the visit.
      ko: 시간, 이동, 비용과 방문 중 확인 가능한 범위를 정합니다.
      my: အချိန်၊ လမ်းကြောင်း၊ စျေးနှုန်းနှင့် သွားကြည့်ချိန်တွင် စစ်ဆေးနိုင်သောအရာများကို အတည်ပြုပါသည်။
  - title:
      en: Visit and check together
      ko: 함께 방문 및 확인
      my: အတူသွားကြည့်ပြီး စစ်ဆေးခြင်း
    body:
      en: We use the checklist and help with simple questions during the viewing.
      ko: 체크리스트를 사용하고 집 보기 중 간단한 질문을 돕습니다.
      my: Checklist ကို အသုံးပြုပြီး အိမ်ကြည့်ချိန်တွင် မေးခွန်းမေးရန် ကူညီပါသည်။
  - title:
      en: Receive summary
      ko: 요약 받기
      my: Summary လက်ခံခြင်း
    body:
      en: You receive a short observation summary to compare before deciding.
      ko: 결정 전에 비교할 수 있도록 짧은 관찰 요약을 받습니다.
      my: မဆုံးဖြတ်မီ နှိုင်းယှဉ်နိုင်ရန် observation summary တိုကို လက်ခံရရှိပါသည်။
