title:
  en: Home-viewing companion 1:1 guidance
  ko: 집 보기 동행 1:1 안내
  my: အိမ်ကြည့်အတူလိုက် 1:1 လမ်းညွှန်
summary:
  en: We accompany you to homes you found yourself and help with interpretation, an on-site checklist,
    living-area checks, and comparison opinions. You confirm property and contract matters with a licensed
    realtor and make every decision yourself.
  ko: 고객이 직접 찾은 집에 동행해 통역, 현장 체크리스트, 생활환경 확인과 비교 의견을 제공합니다. 매물과 계약 관련 사항은
    공인중개사에게 확인하고 모든 결정은 본인이 직접 합니다.
  my: သင်ကိုယ်တိုင် ရှာဖွေထားသောအိမ်များကို ကြည့်ရာတွင် အတူလိုက်ကာ ဘာသာပြန်ကူညီခြင်း၊ နေရာတွင်
    စစ်ဆေးရမည့်စာရင်း၊ ပတ်ဝန်းကျင်နေထိုင်မှုအခြေအနေ စစ်ဆေးခြင်းနှင့် နှိုင်းယှဉ်အမြင်ပေးခြင်းတို့ကို
    လုပ်ဆောင်ပါသည်။ အိမ်နှင့် စာချုပ်ဆိုင်ရာအချက်များကို လိုင်စင်ရ အိမ်ခြံမြေကျွမ်းကျင်သူထံတွင်
    အတည်ပြုပြီး ဆုံးဖြတ်ချက်အားလုံးကို သင်ကိုယ်တိုင် ချမှတ်ရပါမည်။
recommendedFor:
  - en: You already found homes to view and arranged the appointments yourself.
    ko: 볼 집을 직접 찾고 방문 약속까지 정한 분
    my: ကြည့်လိုသည့်အိမ်ကို ကိုယ်တိုင်ရှာဖွေပြီး သွားကြည့်ရန်ချိန်းဆိုထားသူ
  - en: You want language support while asking questions and listening to explanations at the viewing.
    ko: 집을 보며 질문하고 설명을 들을 때 언어 지원이 필요한 분
    my: အိမ်ကြည့်ရာတွင် မေးခွန်းမေးခြင်းနှင့် ရှင်းလင်းချက်နားထောင်ခြင်းအတွက် ဘာသာစကားအကူအညီလိုသူ
  - en: You want to compare the home, shared spaces, and living environment using the same checklist.
    ko: 집 안, 공용공간과 생활환경을 같은 체크리스트로 비교하고 싶은 분
    my: အိမ်အတွင်း၊ အများသုံးနေရာနှင့် နေထိုင်မှုပတ်ဝန်းကျင်ကို တူညီသောစစ်ဆေးစာရင်းဖြင့်
      နှိုင်းယှဉ်လိုသူ
included:
  - title:
      en: Prepare a viewing checklist
      ko: 집 보기 체크리스트 준비
      my: အိမ်ကြည့်စစ်ဆေးစာရင်း ပြင်ဆင်ခြင်း
    body:
      en: We organize the points to observe based on your priorities and the homes whose visits you already
        arranged.
      ko: 본인의 우선순위와 직접 방문 약속을 정한 집을 기준으로 현장에서 살펴볼 항목을 정리합니다.
      my: သင့်ဦးစားပေးအချက်များနှင့် သင်ကိုယ်တိုင် သွားကြည့်ရန်ချိန်းဆိုထားသော အိမ်များကို အခြေခံ၍
        နေရာတွင် စစ်ဆေးရမည့်အချက်များကို စုစည်းပါသည်။
  - title:
      en: Accompany and interpret
      ko: 현장 동행·통역
      my: နေရာသို့ အတူလိုက်ပြီး ဘာသာပြန်ကူညီခြင်း
    body:
      en: We come to the arranged viewing, help you ask your questions, and interpret explanations so you
        can understand them.
      ko: 약속된 집 보기에 함께 가서 본인이 질문할 수 있도록 돕고 설명을 이해할 수 있게 통역합니다.
      my: ချိန်းဆိုထားသော အိမ်ကြည့်ရာသို့ အတူလိုက်ပြီး သင်ကိုယ်တိုင် မေးခွန်းမေးနိုင်ရန် ကူညီကာ
        ရှင်းလင်းချက်များကို နားလည်စေရန် ဘာသာပြန်ပေးပါသည်။
  - title:
      en: Check the home and living environment
      ko: 집·생활환경 체크
      my: အိမ်နှင့် နေထိုင်မှုပတ်ဝန်းကျင် စစ်ဆေးခြင်း
    body:
      en: With permission, we observe the home, shared spaces, transport, nearby conveniences, and other
        practical points on the checklist.
      ko: 허락을 받은 범위에서 집 안, 공용공간, 교통, 주변 편의와 체크리스트의 생활 포인트를 함께 살펴봅니다.
      my: ခွင့်ပြုချက်ရသည့်အတိုင်းအတာအတွင်း အိမ်အတွင်း၊ အများသုံးနေရာ၊ သယ်ယူပို့ဆောင်ရေး၊ အနီးအနား
        အဆင်ပြေမှုနှင့် စစ်ဆေးစာရင်းရှိ နေထိုင်ရေးအချက်များကို အတူကြည့်ရှုပါသည်။
  - title:
      en: Share comparison opinions
      ko: 비교 의견 정리
      my: နှိုင်းယှဉ်အမြင် စုစည်းခြင်း
    body:
      en: We compare what was observed against your priorities and send a short summary after the viewing.
      ko: 현장에서 본 내용을 본인의 우선순위와 비교해 의견을 정리하고 방문 후 짧은 요약을 보냅니다.
      my: နေရာတွင် တွေ့ရှိသည့်အချက်များကို သင့်ဦးစားပေးအချက်များနှင့် နှိုင်းယှဉ်ကာ အမြင်ကို စုစည်းပြီး
        အိမ်ကြည့်ပြီးနောက် အနှစ်ချုပ်တိုတစ်ခု ပို့ပေးပါသည်။
process:
  - title:
      en: Confirm scope and cost by DM
      ko: DM으로 범위·비용 확인
      my: DM ဖြင့် အတိုင်းအတာနှင့် ကုန်ကျစရိတ် စစ်ဆေးခြင်း
    body:
      en: Send the short first message. We confirm availability, possible scope, timing, and cost before you
        decide.
      ko: 짧은 첫 메시지를 보내면 결정 전에 가능 여부, 범위, 일정과 비용을 확인합니다.
      my: ပထမဆုံး မက်ဆေ့ချ်တိုကို ပို့ပါ။ သင်မဆုံးဖြတ်မီ ကူညီနိုင်မှု၊ အတိုင်းအတာ၊ အချိန်နှင့်
        ကုန်ကျစရိတ်ကို အတူစစ်ဆေးပါမည်။
  - title:
      en: Share the arranged viewing and priorities
      ko: 방문 약속·우선순위 공유
      my: အိမ်ကြည့်ချိန်းဆိုမှုနှင့် ဦးစားပေးအချက်များ မျှဝေခြင်း
    body:
      en: Share the viewing appointment, addresses, number of homes, and what matters most to your daily life.
      ko: 직접 정한 방문 일정, 주소, 집의 수와 생활에서 중요하게 보는 조건을 공유합니다.
      my: သင်ကိုယ်တိုင် ချိန်းဆိုထားသော အချိန်၊ လိပ်စာ၊ အိမ်အရေအတွက်နှင့် နေ့စဉ်ဘဝအတွက်
        အရေးကြီးဆုံးအချက်များကို မျှဝေပါ။
  - title:
      en: Agree on the checklist
      ko: 체크리스트 확인
      my: စစ်ဆေးစာရင်း အတည်ပြုခြင်း
    body:
      en: We organize the viewing points and confirm what can be observed within the agreed visit.
      ko: 집 보기 포인트를 정리하고 합의한 방문 안에서 함께 살펴볼 범위를 확인합니다.
      my: အိမ်ကြည့်ရာတွင် စစ်ဆေးမည့်အချက်များကို စုစည်းပြီး သဘောတူထားသော သွားရောက်မှုအတွင်း
        အတူကြည့်ရှုနိုင်သည့် အတိုင်းအတာကို အတည်ပြုပါသည်။
  - title:
      en: Visit together and receive a short summary
      ko: 현장 동행·짧은 요약 확인
      my: အတူသွားကြည့်ပြီး အနှစ်ချုပ်တို လက်ခံခြင်း
    body:
      en: We use the checklist at the viewing and send a short comparison summary afterward for your own
        decision.
      ko: 현장에서 체크리스트를 함께 확인하고, 본인이 판단할 수 있도록 방문 후 짧은 비교 요약을 보냅니다.
      my: အိမ်ကြည့်ရာတွင် စစ်ဆေးစာရင်းကို အတူအသုံးပြုပြီး သင်ကိုယ်တိုင် ဆုံးဖြတ်နိုင်ရန် နောက်ပိုင်းတွင်
        နှိုင်းယှဉ်အနှစ်ချုပ်တိုကို ပို့ပေးပါသည်။
deliverables:
  - en: An on-site checklist organized around your priorities
    ko: 본인의 우선순위를 반영한 현장 체크리스트
    my: သင့်ဦးစားပေးအချက်များကို ထည့်သွင်းထားသော နေရာတွင်အသုံးပြုမည့် စစ်ဆေးစာရင်း
  - en: Interpretation support and comparison opinions during the arranged viewing
    ko: 약속된 집 보기 중 통역 지원과 비교 의견
    my: ချိန်းဆိုထားသော အိမ်ကြည့်ချိန်အတွင်း ဘာသာပြန်အကူအညီနှင့် နှိုင်းယှဉ်အမြင်
  - en: A short DM summary of observations after the viewing
    ko: 방문 후 현장에서 본 내용을 정리한 짧은 DM 요약
    my: အိမ်ကြည့်ပြီးနောက် နေရာတွင်တွေ့ရှိသည့်အချက်များကို စုစည်းထားသော DM အနှစ်ချုပ်တို
preparation:
  - en: Viewing appointments and addresses you arranged yourself, including how many homes you will visit
    ko: 본인이 직접 정한 방문 일정과 주소, 방문할 집의 수
    my: သင်ကိုယ်တိုင် ချိန်းဆိုထားသော အိမ်ကြည့်အချိန်၊ လိပ်စာနှင့် သွားကြည့်မည့်အိမ်အရေအတွက်
  - en: Your daily-life priorities, must-have conditions, and main concerns
    ko: 생활 우선순위, 꼭 필요한 조건과 가장 걱정되는 점
    my: နေ့စဉ်ဘဝ ဦးစားပေးအချက်များ၊ မဖြစ်မနေလိုအပ်သောအခြေအနေများနှင့် အဓိကစိုးရိမ်ချက်များ
  - en: Permission before taking photos or operating fixtures, plus questions for the licensed realtor
    ko: 사진 촬영·설비 작동 전 허락과 공인중개사에게 직접 물어볼 질문
    my: ဓာတ်ပုံရိုက်ခြင်း သို့မဟုတ် ပစ္စည်းကိရိယာအသုံးပြုခြင်းမတိုင်မီ ခွင့်ပြုချက်နှင့် လိုင်စင်ရ
      အိမ်ခြံမြေကျွမ်းကျင်သူကို ကိုယ်တိုင်မေးရန် မေးခွန်းများ
